# Base MkDocs config. Nav and docs_dir are generated by scripts/collect_mkdocs.py.
# site_url is set in collect_mkdocs.py (required for navigation.instant + tabs).
site_name: Homelab Cluster Docs
site_description: GitOps cluster documentation (sources in documentation/)
copyright: Copyright &copy; Homelab

# https://squidfunk.github.io/mkdocs-material/setup/adding-a-git-repository/
repo_url: https://github.com/nerddotdad/truecharts
repo_name: nerddotdad/truecharts
edit_uri: edit/main/documentation/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.follow

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false
