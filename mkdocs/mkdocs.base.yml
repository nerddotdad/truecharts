# Base MkDocs config. Nav and docs_dir are generated by scripts/collect_mkdocs.py.
# site_url is set in collect_mkdocs.py (required for navigation.instant + tabs).
site_name: Homelab Cluster Docs
site_description: GitOps cluster documentation (co-located mk_*.md sources)
copyright: Copyright &copy; Homelab

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false
