---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wizarr
  namespace: downloaders
spec:
  interval: 15m
  chart:
    spec:
      chart: wizarr
      version: 13.5.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: volsync.backube
              version: v1alpha1
              kind: ReplicationDestination
            patch: |
              - op: replace
                path: /spec/trigger
                value:
                  schedule: "5 1 * * *"
  values:
    credentials:
      truenas_garage:
        type: s3
        url: "${GARAGE_URL}"
        region: garage
        bucket: truecharts
        accessKey: "${GARAGE_ACCESS_KEY_ID}"
        secretKey: "${GARAGE_SECRET_ACCESS_KEY}"
        encrKey: "${ADMIN_PASS}"
    image:
      repository: ghcr.io/wizarrrr/wizarr
      pullPolicy: IfNotPresent
      tag: latest@sha256:19da537e01b5470cb34b083b5ac64cb534dd27084d9d66bc634e96c1f3976884
    persistence:
      database:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        mountPath: /data/database
        volsync:
          - name: database
            type: restic
            credentials: truenas_garage
            cleanupTempPVC: true
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: "0 1 * * *"
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: wizarr.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          traefik:
              enabled: false
          homepage:
            enabled: true
            name: Wizarr
            description: This is a wizarr instance
            group: "{{ .Release.Namespace }}"
            icon: ""
            widget:
              enabled: false
      admin:
        enabled: true
        ingressClassName: external
        hosts:
          - host: wizarr.${DOMAIN_0}
            paths:
              - path: /admin
                pathType: Prefix
        integrations:
          nginx:
            ipWhitelist: ["${IP_WHITELIST}"]
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          traefik:
              enabled: false
