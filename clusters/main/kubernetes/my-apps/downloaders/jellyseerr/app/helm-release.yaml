apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyseerr
  namespace: downloaders
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyseerr
      version: 14.4.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    credentials:
      truenas_garage:
        type: s3
        url: "${GARAGE_URL}"
        region: garage
        bucket: truecharts
        accessKey: "${GARAGE_ACCESS_KEY_ID}"
        secretKey: "${GARAGE_SECRET_ACCESS_KEY}"
        encrKey: "${ADMIN_PASS}"
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        mountPath: /app/config
        volsync:
          - name: config
            type: restic
            credentials: truenas_garage
            cleanupTempPVC: true
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: "50 0 * * *"
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: jellyseerr.${DOMAIN_0}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          traefik:
              enabled: false
          homepage:
            enabled: true
            name: jellyseerr
            description: This is a jellyseerr instance
            group: "{{ .Release.Namespace }}"
            icon: ""
            widget:
              custom:
                key: ${HP_JELLYSEERR}