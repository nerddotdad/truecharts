apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbget
  namespace: downloaders
spec:
  interval: 15m
  chart:
    spec:
      chart: nzbget
      version: 30.4.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: volsync.backube
              version: v1alpha1
              kind: ReplicationDestination
            patch: |
              - op: replace
                path: /spec/trigger
                value:
                  schedule: "35 0 * * *"
  values:
    credentials:
      truenas_garage:
        type: s3
        url: "${GARAGE_URL}"
        region: garage
        bucket: truecharts
        accessKey: "${GARAGE_ACCESS_KEY_ID}"
        secretKey: "${GARAGE_SECRET_ACCESS_KEY}"
        encrKey: "${ADMIN_PASS}"
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        mountPath: /config
        volsync:
          - name: config
            type: restic
            credentials: truenas_garage
            cleanupTempPVC: true
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: "30 0 * * *"
      downloads:
        enabled: true
        type: nfs
        mountPath: /config/downloads
        path: ${NFS_MEDIA_USENET}
        server: ${NAS_IP}
      scripts:
        enabled: true
        type: nfs
        mountPath: /app/scripts
        path: ${NFS_NZBGET_SCRIPTS}
        server: ${NAS_IP}
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts: 
          - host: nzbget.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: NZBget
            description: This is a NZBget instance
            group: "{{ .Release.Namespace }}"
            icon: ""
            widget:
                custom:
                  username: ${NZBGET_USERNAME}
                  password: ${NZBGET_PASSWORD}
