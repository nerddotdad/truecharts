apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-restore-test
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: immich
      version: 28.4.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 30m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    credentials:
      cloudflare_r2:
        type: s3
        url: "${CLOUDFLARE_R2_URL}"
        bucket: "${CLOUDFLARE_R2_BUCKET_PREFIX}-immich"
        accessKey: "${CLOUDFLARE_R2_ACCESS_KEY_ID}"
        secretKey: "${CLOUDFLARE_R2_SECRET_ACESS_KEY}"
        encrKey: "${CLOUDFLARE_R2_ENCRKEY}"
    cnpg:
      main:
        # mode: recovery
        recovery:
          credentials: cloudflare_r2
        backups:
          enabled: true
          credentials: cloudflare_r2
    persistence:
      mlcache:
        enabled: true
        type: emptyDir
        targetSelector:
          machinelearning:
            machinelearning:
              mountPath: /mlcache
      microcache:
        enabled: true
        type: emptyDir
        targetSelector:
          microservices:
            microservices:
              mountPath: /microcache
      backups:
        enabled: true
        type: emptyDir
        mountPath: /usr/src/app/upload/backups/
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      video:
        enabled: true
        type: emptyDir
        mountPath: /usr/src/app/upload/encoded-video/
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      library:
        enabled: true
        type: emptyDir
        mountPath: /usr/src/app/upload/library/
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      uploads:
        enabled: true
        type: emptyDir
        mountPath: /usr/src/app/upload/upload/
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      thumbs:
        enabled: true
        type: emptyDir
        mountPath: /usr/src/app/upload/thumbs/
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      profile:
        enabled: true
        type: emptyDir
        mountPath: /usr/src/app/upload/profile/
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      external:
        enabled: true
        type: emptyDir
        mountPath: /usr/src/app/external
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
    workload:
      main:
        replicas: 1
    ingress:
      main:
        enabled: false
