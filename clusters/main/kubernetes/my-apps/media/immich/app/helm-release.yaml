apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: immich
      version: 27.5.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 30m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Fresh Immich overlay: everything else comes from chart defaults
    # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/immich/values.yaml
    #
    # For a truly empty Postgres: delete CNPG Cluster immich-cnpg-main + its PVCs in the cluster once,
    # then let Flux reconcile so initdb runs on new volumes. This Git state does NOT recover from R2.
    credentials:
      cloudflare_r2:
        type: s3
        url: "${CLOUDFLARE_R2_URL}"
        bucket: "${CLOUDFLARE_R2_BUCKET_PREFIX}-immich"
        accessKey: "${CLOUDFLARE_R2_ACCESS_KEY_ID}"
        secretKey: "${CLOUDFLARE_R2_SECRET_ACESS_KEY}"
        encrKey: "${CLOUDFLARE_R2_ENCRKEY}"
    cnpg:
      main:
        mode: recovery
        # Single-node cluster: avoid a second Postgres replica (was failing with Longhorn I/O on replica PVC).
        cluster:
          instances: 1
          singleNode: true
        backups:
          enabled: true
          revision: "3"
          credentials: cloudflare_r2
          retentionPolicy: "7d"
          scheduledBackups:
            - name: daily-backup
              schedule: "0 0 1 * * *"
              backupOwnerReference: self
              immediate: true
              suspend: false
    persistence:
      mlcache:
        enabled: true
        type: emptyDir
        targetSelector:
          machinelearning:
            machinelearning:
              mountPath: /mlcache
      microcache:
        enabled: true
        type: emptyDir
        targetSelector:
          microservices:
            microservices:
              mountPath: /microcache
      backups:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/backups/
        path: ${NFS_IMMICH_BACKUPS}
        server: ${NAS_IP}
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      video:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/encoded-video/
        path: ${NFS_IMMICH_ENCODED_VIDEO}
        server: ${NAS_IP}
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      library:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/library/
        path: ${NFS_IMMICH_LIBRARY}
        server: ${NAS_IP}
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      uploads:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/upload/
        path: ${NFS_IMMICH_UPLOAD}
        server: ${NAS_IP}
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      thumbs:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/thumbs/
        path: ${NFS_IMMICH_THUMBS}
        server: ${NAS_IP}
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      profile:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/profile/
        path: ${NFS_IMMICH_PROFILE}
        server: ${NAS_IP}
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
      external:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/external
        path: ${NFS_IMMICH_EXTERNAL}
        server: ${NAS_IP}
        targetSelector:
          main:
            main: {}
          microservices:
            microservices: {}
    workload:
      main:
        replicas: 1
        # Dropped per-container resources override (was gpu.intel.com/i915: 1) — no i915 in node allocatable
        # until Intel device plugin is healthy; chart defaults apply for main container resources.
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: immich.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
          - host: immich-internal.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: "Immich"
            description: "Immich Instance"
            group: "{{ .Release.Namespace }}"
            widget:
              custom:
                key: "${HP_IMMICH}"
