apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: immich
      version: 27.0.13
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  # CNPG recovery + NFS volume mounts + dependent workloads can exceed 10m on install/upgrade.
  timeout: 30m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Prefer control plane for immich (media processing can run on control plane)
    podOptions:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
    credentials:
      cloudflare_r2:
        type: s3
        url: "${CLOUDFLARE_R2_URL}"
        bucket: "${CLOUDFLARE_R2_BUCKET_PREFIX}-immich"
        accessKey: "${CLOUDFLARE_R2_ACCESS_KEY_ID}"
        secretKey: "${CLOUDFLARE_R2_SECRET_ACESS_KEY}"
        encrKey: "${CLOUDFLARE_R2_ENCRKEY}"
    cnpg:
      # VectorChord migration (chart 24→25): https://trueforge.org/truetech/truecharts/charts/stable/immich/migrate-to-vectorchord/
      # If the DB was switched to the VectorChord image before embeddings were cast to pgvector's type, unqualified
      # "vector(dim)" in Step 3 can resolve to vectors.vector (pgvecto). That image has no $libdir/vectors — the
      # smart_search/face_search tables become unreadable. Fix: restore CNPG from a backup taken before Step 2,
      # redo the guide, and use "public.vector(<dim>)" in Step 3 (and "public.vector(512)" for face_search).
    # backup process as follows
    ## incriment backup.revsision and recovery.revision +1
      main:
        # Restored DB still uses pgvecto.rs (vectors.*). Default chart image is vectorchord (no $libdir/vectors),
        # which crashes Immich on pg_indexes for clip_index/face_index. Use vectors image until TrueForge
        # migration finishes and types are public.vector; then remove this line for default vectorchord.
        type: vectors
        mode: recovery
        backups:
          enabled: true
          revision: "2"
          credentials: cloudflare_r2
          retentionPolicy: "7d"
          scheduledBackups:
          - name: daily-backup
            schedule: "0 0 1 * * *"
            backupOwnerReference: self
            immediate: true
            suspend: false
        recovery:
          revision: "2"
          credentials: cloudflare_r2
          # PITR into immich-cnpg-main-r2 (R2) before VectorChord WAL churn (2026-04-11). CNPG selects the
          # nearest base backup and replays WAL to this time. Remove pitrTarget after a good restore when
          # switching cnpg.main back to standalone (otherwise a future bootstrap could clamp again).
          pitrTarget:
            time: "2026-04-10T23:59:59Z"
    persistence:
      mlcache:
        enabled: true
        type: emptyDir
        targetSelector:
          machinelearning:
            machinelearning:
              mountPath: /mlcache
      microcache:
        enabled: true
        type: emptyDir
        targetSelector:
          microservices:
            microservices:
              mountPath: /microcache
      backups:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/backups/
        path: ${NFS_IMMICH_BACKUPS}
        server:  ${NAS_IP}
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
      video:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/encoded-video/
        path: ${NFS_IMMICH_ENCODED_VIDEO}
        server:  ${NAS_IP}
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
      library:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/library/
        path: ${NFS_IMMICH_LIBRARY}
        server:  ${NAS_IP}
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
      uploads:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/upload/
        path: ${NFS_IMMICH_UPLOAD}
        server:  ${NAS_IP}
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
      thumbs:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/thumbs/
        path: ${NFS_IMMICH_THUMBS}
        server:  ${NAS_IP}
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
      profile:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/upload/profile/
        path: ${NFS_IMMICH_PROFILE}
        server:  ${NAS_IP}
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
      external:
        enabled: true
        type: nfs
        mountPath: /usr/src/app/external
        path: ${NFS_IMMICH_EXTERNAL}
        server: ${NAS_IP}
        targetSelector:
          # Main pod/container is server
          main:
            main: {}
          microservices:
            microservices: {}
    workload:
      main:
        # Must be >=1: microservices and machinelearning initContainers wait on
        # http://immich:10323/api/server/ping; replicas 0 deadlocks Helm and those pods.
        replicas: 1
        podSpec:
          # runtimeClassName: "intel-gpu"
          containers:
            main:
              resources:
                limits:
                  gpu.intel.com/i915: 1
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts: 
          - host: immich.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: "Immich"
            description: "Immich Instance"
            group: "{{ .Release.Namespace }}"
            widget:
              custom:
                key: "${HP_IMMICH}"