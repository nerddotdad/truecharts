# Jellyfin library/session metrics via rebelcore/jellyfin-exporter (published Docker Hub image).
# Complements built-in Jellyfin ASP.NET /metrics on the main jellyfin chart.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin-exporter
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.14.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 5m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: docker.io/rebelcore/jellyfin-exporter
      pullPolicy: IfNotPresent
      # renovate: datasource=docker depName=rebelcore/jellyfin-exporter
      tag: v1.5.2

    workload:
      main:
        podSpec:
          containers:
            main:
              enabled: true
              # Optional collectors (off by default upstream) — required for rebelcore Grafana dashboard sections:
              # Transcoding, Storage, Scheduled Tasks, Activity.
              # Activity needs Jellyfin "Playback Reporting" plugin with "Keep data for" = Forever.
              args:
                - --collector.transcoding
                - --collector.storage
                - --collector.tasks
                - --collector.activity
              env:
                JELLYFIN_ADDRESS: http://jellyfin.media.svc.cluster.local:8096
                JELLYFIN_TOKEN: "${HP_JELLYFIN}"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 9594
                  path: /metrics
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 12
                liveness:
                  enabled: true
                  type: http
                  port: 9594
                  path: /metrics
                  initialDelaySeconds: 15
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 9594
                  path: /metrics
                  initialDelaySeconds: 5
                  periodSeconds: 10
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 256Mi

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 9594
            protocol: tcp
            targetPort: 9594

    metrics:
      main:
        enabled: true
        endpoints:
          - port: main
            path: /metrics

    ingress:
      main:
        enabled: false
