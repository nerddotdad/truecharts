apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyfin
      version: 23.3.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  # 5m caused repeated upgrade timeouts while the pod was Pending → rollback stuck on old i915 defaults.
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    credentials:
      truenas_garage:
        type: s3
        url: "${GARAGE_URL}"
        region: garage
        bucket: truecharts
        accessKey: "${GARAGE_ACCESS_KEY_ID}"
        secretKey: "${GARAGE_SECRET_ACCESS_KEY}"
        encrKey: "${ADMIN_PASS}"
    workload:
      main:
        podSpec:
          # Remove stale .jellyfin-data marker from /config (Jellyfin 10.9+ expects only .jellyfin-config there)
          initContainers:
            remove-data-marker:
              enabled: true
              type: init
              image: docker.io/library/alpine:3.23
              command:
                - /bin/sh
                - -c
                - "rm -f /config/.jellyfin-data && echo 'Cleaned stale .jellyfin-data marker from /config'"
              securityContext:
                runAsUser: 0
                runAsGroup: 0
          # runtimeClassName: "intel-gpu"
          containers:
            main:
              env:
                # Data lives under /config on the local PVC
                JELLYFIN_DATA_DIR: "/config/data"
                # Jellyfin 10.11.x: EnableMetrics must be true in /config/system.xml on the PVC.
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8096
                  path: /health
                  initialDelaySeconds: 20
                  periodSeconds: 5
                  failureThreshold: 60
                readiness:
                  enabled: true
                  type: http
                  port: 8096
                  path: /health
                liveness:
                  enabled: true
                  type: http
                  port: 8096
                  path: /health
              resources:
                requests:
                  cpu: 250m
                  memory: 2Gi
                limits:
                  cpu: 1500m
                  memory: 6Gi
                  gpu.intel.com/i915: 1
    metrics:
      main:
        enabled: true
        endpoints:
          - port: main
            path: /metrics
        targetSelector: main
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        mountPath: /config
        # VolSync disabled until NFS migration completes (dest populator + src mover
        # race jellyfin for the RWO config volume on single-node Longhorn).
        # Re-enable src-only after migration (see wizarr pattern).
      media:
        enabled: true
        type: nfs
        mountPath: /media
        path: ${NFS_MEDIA}
        server: ${NAS_IP}
    ingress:
      main:
        enabled: true
        ingressClassName: external
        annotations:
          # Metrics live on :8096/metrics (ClusterIP scrape only). Block public ingress access.
          nginx.ingress.kubernetes.io/server-snippet: |
            location = /metrics {
              return 404;
            }
        hosts: 
          - host: jellyfin.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: Jellyfin
            description: This is a jellyfin instance
            group: "{{ .Release.Namespace }}"
            icon: ""
            widget:
              custom:
                key: ${HP_JELLYFIN}