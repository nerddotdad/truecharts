apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyfin
      version: 23.3.6
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  # 5m caused repeated upgrade timeouts while the pod was Pending → rollback stuck on old i915 defaults.
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: volsync.backube
              version: v1alpha1
              kind: ReplicationDestination
            patch: |
              - op: replace
                path: /spec/trigger
                value:
                  schedule: "25 1 * * *"
  values:
    credentials:
      truenas_garage:
        type: s3
        url: "${GARAGE_URL}"
        region: garage
        bucket: truecharts
        accessKey: "${GARAGE_ACCESS_KEY_ID}"
        secretKey: "${GARAGE_SECRET_ACCESS_KEY}"
        encrKey: "${ADMIN_PASS}"
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                # Data lives under /config on the local PVC
                JELLYFIN_DATA_DIR: "/config/data"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8096
                  path: /health
                  initialDelaySeconds: 20
                  periodSeconds: 5
                  failureThreshold: 60
                readiness:
                  enabled: true
                  type: http
                  port: 8096
                  path: /health
                liveness:
                  enabled: true
                  type: http
                  port: 8096
                  path: /health
              resources:
                requests:
                  cpu: 250m
                  memory: 2Gi
                limits:
                  cpu: 1500m
                  memory: 6Gi
                  gpu.intel.com/i915: 1
    metrics:
      main:
        enabled: true
        endpoints:
          - port: main
            path: /metrics
        targetSelector: main
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        mountPath: /config
        volsync:
          - name: config
            type: restic
            credentials: truenas_garage
            cleanupTempPVC: true
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: "20 1 * * *"
      media:
        enabled: true
        type: nfs
        mountPath: /media
        path: ${NFS_MEDIA}
        server: ${NAS_IP}
    ingress:
      main:
        enabled: true
        ingressClassName: external
        annotations:
          # Metrics live on :8096/metrics (ClusterIP scrape only). Block public ingress access.
          nginx.ingress.kubernetes.io/server-snippet: |
            location = /metrics {
              return 404;
            }
        hosts: 
          - host: jellyfin.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: Jellyfin
            description: This is a jellyfin instance
            group: "{{ .Release.Namespace }}"
            icon: ""
            widget:
              custom:
                key: ${HP_JELLYFIN}