apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyfin
      version: 23.3.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  # 5m caused repeated upgrade timeouts while the pod was Pending → rollback stuck on old i915 defaults.
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    workload:
      main:
        podSpec:
          # Remove stale .jellyfin-data marker from /config (Jellyfin 10.9+ expects only .jellyfin-config there)
          initContainers:
            migrate-db-to-pvc:
              enabled: true
              type: init
              image: docker.io/library/alpine:3.23
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  rm -f /config/.jellyfin-data /config/data/.jellyfin-data
                  if [ -f /data/data/jellyfin.db ]; then
                    echo "Jellyfin DB already on PVC"
                    exit 0
                  fi
                  if [ ! -f /config/data/data/jellyfin.db ]; then
                    echo "No NFS database to migrate"
                    exit 0
                  fi
                  echo "Migrating Jellyfin DB from NFS to Longhorn PVC..."
                  mkdir -p /data/data
                  rm -f /config/data/data/jellyfin.db-wal /config/data/data/jellyfin.db-shm
                  cp -a /config/data/data/. /data/data/
                  chown -R 568:568 /data/data
                  echo "Migration complete"
              securityContext:
                runAsUser: 0
                runAsGroup: 0
          # runtimeClassName: "intel-gpu"
          containers:
            main:
              env:
                # Library metadata DB on Longhorn; SQLite on NFS hangs after unclean shutdown.
                JELLYFIN_DATA_DIR: "/data"
              resources:
                requests:
                  cpu: 250m
                  memory: 2Gi
                limits:
                  cpu: 1500m
                  memory: 6Gi
                  gpu.intel.com/i915: 1
    persistence:
      config:
        enabled: true
        type: nfs
        mountPath: /config
        path: ${NFS_JELLYFIN_CONFIG}
        server: ${NAS_IP}
      transcode:
        enabled: true
        type: nfs
        mountPath: /transcode
        path: ${NFS_JELLYFIN_TRANSCODE}
        server: ${NAS_IP}
      media:
        enabled: true
        type: nfs
        mountPath: /media
        path: ${NFS_MEDIA}
        server: ${NAS_IP}
      cache:
        enabled: true
        mountPath: "/cache"
        type: "emptyDir"
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts: 
          - host: jellyfin.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: Jellyfin
            description: This is a jellyfin instance
            group: "{{ .Release.Namespace }}"
            icon: ""
            widget:
              custom:
                key: ${HP_JELLYFIN}