apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immichframe
  namespace: flux-system
spec:
  interval: 10m
  path: clusters/main/kubernetes/my-apps/media/immichframe/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
  dependsOn:
    - name: immich
