# ImmichFrame — digital photo frame for Immich.
# https://immichframe.dev/docs/getting-started/installation/docker
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immichframe
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.14.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  # Image pull + Immich API warmup can exceed 5m after node upgrades.
  timeout: 10m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: ghcr.io/immichframe/immichframe
      pullPolicy: IfNotPresent
      # Immich v3+ required (AlbumUserRole includes "owner"). v1.0.33 is Immich 2.x-only.
      # renovate: datasource=docker depName=ghcr.io/immichframe/immichframe
      tag: v1.0.37.0

    workload:
      main:
        podSpec:
          containers:
            main:
              enabled: true
              fixedEnv:
                TZ: America/Los_Angeles
              env:
                ImmichServerUrl: http://immich.media.svc.cluster.local:10323
                ApiKey: "${IMMICHFRAME_API_KEY}"
                AuthenticationSecret: "${IMMICHFRAME_AUTH_SECRET}"
                Albums: "7b245103-e180-4451-b25c-a2cea5d7bfd0"
                ShowClock: "true"
                ShowProgressBar: "true"
                ShowPhotoDate: "true"
                ShowImageDesc: "true"
                ShowPeopleDesc: "true"
                ShowAlbumName: "true"
                ShowImageLocation: "true"
                ShowMemories: "false"
                ShowFavorites: "false"
                ShowArchived: "false"
                ShowVideos: "false"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8080
                  path: /
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 12
                liveness:
                  enabled: true
                  type: http
                  port: 8080
                  path: /
                  initialDelaySeconds: 15
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 8080
                  path: /
                  initialDelaySeconds: 5
                  periodSeconds: 10
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 256Mi

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8080
            protocol: tcp
            targetPort: 8080

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: immichframe.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: ImmichFrame
            description: Immich digital photo frame
            group: "{{ .Release.Namespace }}"
            icon: mdi-image-frame
            href: https://immichframe.${DOMAIN_0}
            widget:
              enabled: false
