---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: dashboards
spec:
  interval: 15m
  chart:
    spec:
      chart: homepage
      version: 11.24.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Prefer control plane for homepage dashboard
    podOptions:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""

    workload:
      main:
        podSpec:
          automountServiceAccountToken: true
          containers:
            main:
              env:
                # Set this to your host (example: home.mydomain.com)
                HOMEPAGE_ALLOWED_HOSTS: homepage.${DOMAIN_0}

    configmap:
      config:
        enabled: true
        data:
          # https://gethomepage.dev/configs/custom-css-js/
          custom.js: ""
          custom.css: |
            :root {
              --card-radius: 14px;
            }

            .service, .bookmark {
              border-radius: var(--card-radius) !important;
              border: 1px solid color-mix(in srgb, var(--color-500) 28%, transparent);
              box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
            }

            .service:hover, .bookmark:hover {
              transform: translateY(-2px);
              transition: transform 0.18s ease-in-out;
            }

            .group-title {
              letter-spacing: 0.02em;
              text-transform: uppercase;
            }
          kubernetes.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/configs/kubernetes/

            mode: cluster

          settings.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/configs/

            providers:
              longhorn:
                # Use in-cluster Longhorn frontend service to avoid external DNS resolution issues.
                url: http://longhorn-frontend.longhorn-system.svc

            title: HomeLab Control Center
            description: TrueCharts cluster dashboard
            language: en
            headerStyle: underlined
            cardBlur: sm
            statusStyle: dot
            color: slate
            theme: dark
            hideVersion: true
            useEqualHeights: true
            target: _self

            background:
              image: https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2400&auto=format&fit=crop
              blur: sm
              saturate: 115
              brightness: 40
              opacity: 35

            quicklaunch:
              searchDescriptions: true
              hideInternetSearch: false
              showSearchSuggestions: true

          widgets.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/widgets/

            - greeting:
                text_size: xl
                text: "Welcome back"

            - resources:
                cpu: true
                memory: true
                disk: /

            - search:
                provider: duckduckgo
                target: _blank

            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: "main-cluster"
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true

            - longhorn:
                expanded: false
                total: true
                labels: true
                nodes: true

          services.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/configs/services/
            # Intentionally minimal. Service cards are sourced from each app's
            # ingress.main.integrations.homepage configuration.

          bookmarks.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/configs/bookmarks/
            - Cluster:
                - Flux:
                    - abbr: FX
                      href: https://github.com/nerddotdad/truecharts
                      description: GitOps source of truth
                - TrueNAS:
                    - abbr: TN
                      href: https://truenas.${DOMAIN_0}
                      description: Storage administration
                - Kubernetes:
                    - abbr: K8
                      href: https://kubedash.${DOMAIN_0}
                      description: Cluster dashboard

            - References:
                - TrueCharts:
                    - abbr: TC
                      href: https://truecharts.org
                      description: Chart documentation
                - TrueCharts GitHub:
                    - abbr: GH
                      href: https://github.com/truecharts
                      description: Upstream charts and issues
                - Talos:
                    - abbr: TL
                      href: https://www.talos.dev/
                      description: Talos Linux docs
                    
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts: 
          - host: homepage.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"