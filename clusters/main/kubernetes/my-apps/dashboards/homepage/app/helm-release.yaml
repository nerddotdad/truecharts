---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: dashboards
spec:
  interval: 15m
  chart:
    spec:
      chart: homepage
      version: 12.5.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # When true, the chart mounts settings/widgets/etc. read-only under /app/config and
    # Homepage fails with EROFS when it copies skeleton files (see TrueCharts homepage defaults).
    forceConfigFromValues: false

    persistence:
      config:
        enabled: true
        size: 4Gi
        mountPath: /app/config
        targetSelector:
          main:
            main: {}
            init-config: {}

    workload:
      main:
        podSpec:
          automountServiceAccountToken: true
          # Re-assert chart default init: copy ConfigMap-backed /dummy-config into writable /app/config.
          initContainers:
            init-config:
              enabled: true
              type: init
              imageSelector: ubuntuImage
              command:
                - /bin/sh
                - -c
                - |
                  # Bump when GitOps homepage config changes; re-seeds PVC from chart ConfigMap.
                  SEED_VERSION="2026-06-09-bookmarks-bottom"
                  mkdir -p /app/config
                  if [ ! -f /app/config/.seed-version ] || [ "$(cat /app/config/.seed-version 2>/dev/null)" != "$SEED_VERSION" ]; then
                    echo "Seeding homepage config ($SEED_VERSION)..."
                    cp /dummy-config/bookmarks.yaml /app/config/bookmarks.yaml
                    cp /dummy-config/services.yaml /app/config/services.yaml
                    cp /dummy-config/settings.yaml /app/config/settings.yaml
                    cp /dummy-config/widgets.yaml /app/config/widgets.yaml
                    cp /dummy-config/custom.css /app/config/custom.css
                    cp /dummy-config/custom.js /app/config/custom.js
                    echo "$SEED_VERSION" > /app/config/.seed-version
                  fi
          containers:
            main:
              env:
                # Set this to your host (example: home.mydomain.com)
                HOMEPAGE_ALLOWED_HOSTS: homepage.${DOMAIN_0}

    configmap:
      config:
        enabled: true
        data:
          # https://gethomepage.dev/configs/custom-css-js/
          custom.js: ""
          custom.css: |
            :root {
              --card-radius: 12px;
            }

            .service,
            .bookmark {
              border-radius: var(--card-radius) !important;
              border: 1px solid color-mix(in srgb, var(--color-500) 22%, transparent);
            }

            .service:hover,
            .bookmark:hover {
              border-color: color-mix(in srgb, var(--color-400) 40%, transparent);
            }

            .group-title {
              letter-spacing: 0.05em;
              font-size: 0.78rem;
              text-transform: uppercase;
              opacity: 0.88;
            }

            /* Compact icon-only bookmark rows at page bottom */
            a.bookmark {
              min-width: 3rem;
              justify-content: center;
            }
          kubernetes.yaml: |
            ---
            # For configuration options and examples, please see:
            # https://gethomepage.dev/configs/kubernetes/

            mode: cluster

          settings.yaml: |
            ---
            # https://gethomepage.dev/configs/settings/

            providers:
              longhorn:
                url: http://longhorn-frontend.longhorn-system.svc

            title: Homelab
            description: TrueCharts cluster dashboard
            language: en-US
            theme: dark
            color: zinc
            headerStyle: clean
            iconStyle: theme
            statusStyle: dot
            fullWidth: true
            maxGroupColumns: 6
            bookmarksStyle: icons
            useEqualHeights: true
            hideVersion: true
            disableUpdateCheck: true
            disableIndexing: true
            target: _self

            # cardBlur conflicts with background blur/saturate/brightness — use opacity only.
            cardBlur: md
            background:
              image: https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2400&auto=format&fit=crop
              opacity: 28

            quicklaunch:
              searchDescriptions: true
              hideInternetSearch: false
              showSearchSuggestions: true
              hideVisitURL: false
              mobileButtonPosition: bottom-right

            layout:
              # Services first; bookmark link groups at the bottom as compact icon rows.
              media:
                style: row
                columns: 4
                icon: mdi-play-circle-outline

              downloaders:
                style: row
                columns: 6
                icon: mdi-download-network

              ai:
                style: row
                columns: 4
                icon: mdi-robot-outline

              observability:
                style: row
                columns: 3
                icon: mdi-chart-timeline-variant

              dashboards:
                style: row
                columns: 3
                icon: mdi-view-dashboard-outline

              external:
                style: row
                columns: 3
                icon: mdi-server-network

              smart-home:
                style: row
                columns: 2
                icon: mdi-home-automation

              gaming:
                style: row
                columns: 3
                icon: mdi-gamepad-variant

              tools:
                style: row
                columns: 2

              websites:
                style: row
                columns: 2
                icon: mdi-web

              Cluster:
                iconsOnly: true
                header: false
                style: row
                columns: 6

              References:
                iconsOnly: true
                header: false
                style: row
                columns: 4
                initiallyCollapsed: true

          widgets.yaml: |
            ---
            # https://gethomepage.dev/configs/information-widgets/

            - greeting:
                text_size: lg
                text: "Homelab"

            - datetime:
                text_size: md
                locale: en-US
                format:
                  dateStyle: long
                  timeStyle: short

            - search:
                provider: duckduckgo
                target: _blank
                showSearchSuggestions: true

            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: main-cluster
                nodes:
                  show: false

            - longhorn:
                expanded: false
                total: true
                labels: true
                nodes: false

          services.yaml: |
            ---
            # Service cards come from ingress.main.integrations.homepage on each app.

          bookmarks.yaml: |
            ---
            - Cluster:
                - Flux:
                    - abbr: FX
                      href: https://github.com/nerddotdad/truecharts
                      description: GitOps source of truth
                - TrueNAS:
                    - abbr: TN
                      href: https://truenas.${DOMAIN_0}
                      description: Storage administration
                - Kubernetes:
                    - abbr: K8
                      href: https://kubedash.${DOMAIN_0}
                      description: Cluster dashboard
                - Grafana:
                    - abbr: GF
                      href: https://grafana.${DOMAIN_0}
                      description: Metrics and alerts
                - Docs:
                    - abbr: DO
                      href: https://docs.${DOMAIN_0}
                      description: Homelab runbooks

            - References:
                - TrueCharts:
                    - abbr: TC
                      href: https://truecharts.org
                      description: Chart documentation
                - TrueCharts GitHub:
                    - abbr: GH
                      href: https://github.com/truecharts
                      description: Upstream charts and issues
                - Talos:
                    - abbr: TL
                      href: https://www.talos.dev/
                      description: Talos Linux docs
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts: 
          - host: homepage.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"