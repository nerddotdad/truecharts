---
# Static MkDocs site (nginx). Image is built in CI from documentation/ + helm-release.yaml — not served from GitHub Actions.
# Runtime: app-template Deployment + Service + Ingress at https://docs.${DOMAIN_0}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homelab-docs
  namespace: dashboards
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.14.3
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 5m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: ghcr.io/nerddotdad/homelab-docs
      pullPolicy: IfNotPresent
      # renovate: datasource=docker depName=ghcr.io/nerddotdad/homelab-docs
      tag: 1.0.14@sha256:259c7894bbbadb3410a7d0e7c5f349f64aaea41a846c285e6efd53b3ab47caed

    workload:
      main:
        podSpec:
          containers:
            main:
              enabled: true
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8080
                  path: /
                  initialDelaySeconds: 5
                  periodSeconds: 5
                liveness:
                  enabled: true
                  type: http
                  port: 8080
                  path: /
                  initialDelaySeconds: 10
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 8080
                  path: /
                  initialDelaySeconds: 3
                  periodSeconds: 10
              resources:
                requests:
                  memory: 32Mi
                  cpu: 10m
                limits:
                  memory: 128Mi

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8080
            protocol: tcp
            targetPort: 8080

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: docs.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Cluster docs
            description: MkDocs — co-located mk_*.md from GitOps
            group: dashboards
            icon: mdi-book-open-page-variant
            href: https://docs.${DOMAIN_0}
            widget:
              enabled: false
