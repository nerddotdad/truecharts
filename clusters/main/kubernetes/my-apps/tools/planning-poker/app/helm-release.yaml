---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: planning-poker
  namespace: tools
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 15.38.7
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 5m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: ghcr.io/nerddotdad/self-host-planning-poker
      pullPolicy: IfNotPresent
      tag: latest

    workload:
      main:
        podSpec:
          containers:
            main:
              enabled: true
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8000
                  path: /
                  initialDelaySeconds: 10
                  periodSeconds: 10
                liveness:
                  enabled: true
                  type: http
                  port: 8000
                  path: /
                  initialDelaySeconds: 10
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 8000
                  path: /
                  initialDelaySeconds: 5
                  periodSeconds: 10
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8000
            protocol: tcp
            targetPort: 8000

    persistence:
      data:
        enabled: true
        type: pvc
        size: 1Gi
        mountPath: /data

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: planning-poker.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
