---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-ntfy-config
  namespace: observability
data:
  config.yml: |
    http:
      addr: :8000
    ntfy:
      baseurl: http://ntfy.observability.svc.cluster.local:10222
      notification:
        topic: homelab-alerts
        priority: |
          status == "firing" && labels.severity == "critical" ? "urgent" : (status == "firing" ? "high" : "default")
        tags:
          - tag: rotating_light
            condition: status == "firing"
          - tag: white_check_mark
            condition: status == "resolved"
          - tag: warning
            condition: labels.severity == "warning"
          - tag: skull
            condition: labels.severity == "critical"
        templates:
          title: |
            {{- if eq .Status "resolved" -}}
            ✅ Resolved: {{ or (index .Annotations "summary") (index .Labels "alertname") "Alert" }}
            {{- else -}}
            🔥 {{ or (index .Annotations "summary") (index .Labels "alertname") "Alert" }}
            {{- end -}}
          description: |
            {{- if index .Annotations "description" -}}
            {{ index .Annotations "description" }}
            {{- else if index .Annotations "message" -}}
            {{ index .Annotations "message" }}
            {{- else if index .Annotations "summary" -}}
            {{ index .Annotations "summary" }}
            {{- else -}}
            Alert {{ .Labels.alertname }} is {{ .Status }}.
            {{- end }}
            {{- with .Labels.exported_namespace }}

            Flux namespace: {{ . }}{{ end }}{{- with .Labels.name }}
            Release: {{ . }}{{ end }}{{- if or .Labels.chart .Labels.chart_ref }}

            Chart: {{ .Labels.chart }}{{ .Labels.chart_ref }}{{ end }}{{- with .Labels.chart_version }}

            Chart version: {{ . }}{{ end }}{{- with .Labels.namespace }}

            Namespace: {{ . }}{{ end }}{{- with .Labels.job_name }}
            Job: {{ . }}{{ end }}{{- with .Labels.pod }}
            Pod: {{ . }}{{ end }}{{- with .Labels.severity }}
            Severity: {{ . }}{{ end }}
          headers:
            # Tap notification → open this topic in the ntfy app (not in-cluster Prometheus).
            X-Click: https://ntfy.${DOMAIN_0}/homelab-alerts
            # Action buttons (view = open URL). Never use .GeneratorURL (phone cannot reach cluster DNS).
            X-Actions: |
              {{- $runbook := or (index .Annotations "runbook_url") (index .Annotations "runbook") "https://runbooks.prometheus-operator.dev/" -}}
              {{- $grafanaAlert := printf "https://grafana.${DOMAIN_0}/alerting/list?search=%s" .Labels.alertname -}}
              {{- $incident := or .Fingerprint (printf "%s-%s" .Labels.alertname .Labels.namespace) -}}
              {{- $askAi := printf "https://hermes.${DOMAIN_0}/?incident=%s&autostart=1" $incident -}}
              view, Ask AI, {{ $askAi }}; view, Runbook, {{ $runbook }}; view, Alert, {{ $grafanaAlert }}{{- with index .Annotations "dashboard_url" }}; view, Dashboard, {{ . }}{{- end }}
        async: false
