---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-ntfy
  namespace: observability
  labels:
    app.kubernetes.io/name: alertmanager-ntfy
    app.kubernetes.io/part-of: homelab-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager-ntfy
  template:
    metadata:
      annotations:
        # Roll pod when config changes (alertmanager-ntfy reads config only at startup).
        checksum/config: 8-no-emoji-priority-tags
      labels:
        app.kubernetes.io/name: alertmanager-ntfy
    spec:
      containers:
        - name: alertmanager-ntfy
          image: ghcr.io/alexbakker/alertmanager-ntfy:1.2.1
          args:
            - --configs
            - /etc/alertmanager-ntfy/config.yml
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager-ntfy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: alertmanager-ntfy-config
