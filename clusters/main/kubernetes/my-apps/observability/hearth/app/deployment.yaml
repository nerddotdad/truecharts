---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hearth
  namespace: observability
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/part-of: hearth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hearth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hearth
        app.kubernetes.io/part-of: hearth
    spec:
      serviceAccountName: hearth
      # Match HERMES_UID below so Longhorn PVC is group-writable for agent + hearth.
      securityContext:
        fsGroup: 1000
      initContainers:
        # Seed agent home before /init chowns and drops privileges.
        - name: agent-seed
          image: nousresearch/hermes-agent:v2026.7.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # $$ escapes for Flux postBuild envsubst — shell sees single $.
              H=/opt/data
              mkdir -p "$$H/logs"
              if [ -f /seed/config.yaml ]; then
                if [ ! -f "$$H/config.yaml" ] || ! python3 -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))" "$$H/config.yaml" 2>/dev/null; then
                  cp /seed/config.yaml "$$H/config.yaml"
                fi
              fi
              if [ -f /seed/ensure-mcp.py ]; then
                HERMES_HOME="$$H" python3 /seed/ensure-mcp.py || true
              fi
              touch "$$H/.env"
              grep -q '^API_SERVER_ENABLED=' "$$H/.env" 2>/dev/null \
                || echo 'API_SERVER_ENABLED=true' >> "$$H/.env"
              if [ -n "$${API_SERVER_KEY:-}" ]; then
                sed -i '/^API_SERVER_KEY=/d' "$$H/.env" || true
                echo "API_SERVER_KEY=$${API_SERVER_KEY}" >> "$$H/.env"
              fi
              grep -q '^API_SERVER_HOST=' "$$H/.env" 2>/dev/null \
                || echo 'API_SERVER_HOST=0.0.0.0' >> "$$H/.env"
              chown -R 1000:1000 "$$H" || true
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: API_SERVER_KEY
              value: "${HEARTH_AGENT_API_KEY}"
            - name: HEARTH_SANDBOX_AGENT_API_KEY
              value: "${HEARTH_SANDBOX_AGENT_API_KEY}"
            - name: HEARTH_MCP_URL
              value: http://127.0.0.1:8000/mcp
            - name: SEARXNG_URL
              value: http://searxng.ai.svc.cluster.local:8080
          volumeMounts:
            - name: agent-data
              mountPath: /opt/data
            - name: agent-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: hearth
          image: ghcr.io/nerddotdad/hearth:7.5.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: INCIDENT_DIR
              value: /data/incidents
            - name: NTFY_BASE_URL
              value: http://ntfy.observability.svc.cluster.local:10222
            - name: NTFY_TOPIC
              value: homelab-alerts
            - name: NTFY_PUBLIC_URL
              value: https://ntfy.${DOMAIN_0}
            - name: GRAFANA_PUBLIC_URL
              value: https://grafana.${DOMAIN_0}
            - name: TRIAGE_AUTH_TOKEN
              value: "${HERMES_ALERT_TRIAGE_SECRET}"
            - name: INCIDENTS_PUBLIC_BASE_URL
              value: "https://incidents.${DOMAIN_0}"
            - name: HEARTH_SANDBOX_ENABLED
              value: "true"
            - name: HEARTH_SANDBOX_BACKEND
              value: kubernetes
            - name: HEARTH_SANDBOX_NAMESPACE
              value: hearth-sandboxes
            - name: HEARTH_SANDBOX_IMAGE
              value: ghcr.io/nerddotdad/hearth-sandbox:0.1.0
            - name: HEARTH_SANDBOX_SERVICE_ACCOUNT
              value: hearth-sandbox
            - name: HEARTH_SANDBOX_CLUSTER_BASE_URL
              value: http://hearth.observability.svc.cluster.local:8000
            - name: HEARTH_SANDBOX_PUBLIC_BASE_URL
              value: "https://incidents.${DOMAIN_0}"
            - name: HEARTH_SANDBOX_AGENT_API_KEY
              value: "${HEARTH_SANDBOX_AGENT_API_KEY}"
            - name: HEARTH_AIOPS_PROVIDER
              value: "agent"
            - name: HEARTH_AIOPS_AGENT
              value: hermes
            - name: HEARTH_MODEL_PLATFORM
              value: ollama
            - name: HEARTH_OLLAMA_URL
              value: http://ollama.ai.svc.cluster.local:11434
            # Model is chosen in Settings → AIOps and sent per-request to Hermes (not pinned here).
            # Sidecar on localhost — same pod as hearth.
            - name: HEARTH_AGENT_URL
              value: http://127.0.0.1:8642
            - name: HEARTH_AGENT_API_KEY
              value: "${HEARTH_AGENT_API_KEY}"
            - name: HEARTH_AGENT_HOME
              value: /opt/agent-data
            - name: HEARTH_SECRETS_TOKEN
              value: "${HEARTH_SANDBOX_AGENT_API_KEY}"
            - name: HEARTH_SECRETS_EXPORT_URL
              value: http://127.0.0.1:8000/api/aiops/secrets/export
          volumeMounts:
            - name: incidents
              mountPath: /data/incidents
            - name: agent-data
              mountPath: /opt/agent-data
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30

        # Hermes Agent core + dashboard via image /init (s6). Do not override ENTRYPOINT.
        - name: agent
          image: nousresearch/hermes-agent:v2026.7.20
          imagePullPolicy: IfNotPresent
          ports:
            - name: agent
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          # Image ENTRYPOINT is /init; args become the main program (gateway run).
          args:
            - gateway
            - run
          env:
            - name: HERMES_HOME
              value: /opt/data
            # Align with pod fsGroup so Longhorn volume is writable after /init drop.
            - name: HERMES_UID
              value: "1000"
            - name: HERMES_GID
              value: "1000"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              value: "${HEARTH_AGENT_API_KEY}"
            - name: HEARTH_SANDBOX_AGENT_API_KEY
              value: "${HEARTH_SANDBOX_AGENT_API_KEY}"
            - name: HEARTH_SECRETS_TOKEN
              value: "${HEARTH_SANDBOX_AGENT_API_KEY}"
            - name: HEARTH_SECRETS_EXPORT_URL
              value: http://127.0.0.1:8000/api/aiops/secrets/export
            # Same pod as Hearth — prefer loopback MCP.
            - name: HEARTH_MCP_URL
              value: http://127.0.0.1:8000/mcp
            - name: SEARXNG_URL
              value: http://searxng.ai.svc.cluster.local:8080
            - name: HOMELAB_DOCS_BASE_URL
              value: "https://nerd.dad/latest/homelab/kubernetes"
            - name: HOMELAB_GRAFANA_URL
              value: "https://grafana.${DOMAIN_0}"
            # Official Hermes dashboard supervised by s6 (ingress → hermes-dash.${DOMAIN_0})
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
              value: admin
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              value: "${ADMIN_PASS}"
            - name: HERMES_DASHBOARD_BASIC_AUTH_SECRET
              value: "${HEARTH_AGENT_API_KEY}"
          volumeMounts:
            - name: agent-data
              mountPath: /opt/data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health
              port: agent
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /health
              port: agent
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: agent
            initialDelaySeconds: 60
            periodSeconds: 30

      volumes:
        - name: incidents
          persistentVolumeClaim:
            # Keep legacy PVC name so existing incident data is preserved across the rename.
            claimName: homelab-alert-bridge-incidents
        - name: agent-data
          persistentVolumeClaim:
            claimName: hearth-agent-data
        - name: agent-seed
          configMap:
            name: hearth-agent-seed
