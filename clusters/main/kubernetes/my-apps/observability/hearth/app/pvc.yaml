---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homelab-alert-bridge-incidents
  namespace: observability
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/part-of: homelab-observability
  annotations:
    # Preserve volume if the Flux Kustomization is renamed/replaced.
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
