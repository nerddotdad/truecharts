---
# Operator-facing incident UI (ack, merge, enrich, notes, Investigate, triage sandbox).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelab-incidents-ui
  namespace: observability
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/part-of: homelab-observability
  annotations:
    cert-manager.io/cluster-issuer: domain-0-le-prod
    # Keep /api/events SSE + sandbox terminal WebSocket alive through nginx.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: external
  tls:
    - hosts:
        - incidents.${DOMAIN_0}
      secretName: homelab-incidents-ui-tls
  rules:
    - host: incidents.${DOMAIN_0}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hearth
                port:
                  number: 8000
---
# Official Hermes Agent dashboard (sidecar in hearth pod). Basic auth via ADMIN_PASS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hearth-agent-dashboard
  namespace: observability
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/component: agent-dashboard
    app.kubernetes.io/part-of: hearth
  annotations:
    cert-manager.io/cluster-issuer: domain-0-le-prod
spec:
  ingressClassName: external
  tls:
    - hosts:
        - hermes-dash.${DOMAIN_0}
      secretName: hearth-agent-dashboard-tls
  rules:
    - host: hermes-dash.${DOMAIN_0}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hearth
                port:
                  number: 9119
