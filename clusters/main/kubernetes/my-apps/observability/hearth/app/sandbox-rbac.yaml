---
apiVersion: v1
kind: Namespace
metadata:
  name: hearth-sandboxes
  labels:
    app.kubernetes.io/name: hearth-sandboxes
    app.kubernetes.io/part-of: hearth
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hearth
  namespace: observability
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/part-of: hearth
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hearth-sandbox
  namespace: hearth-sandboxes
  labels:
    app.kubernetes.io/name: hearth-sandbox
    app.kubernetes.io/part-of: hearth
---
# Read-only cluster access for triage pods (kubectl/flux inside sandbox).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hearth-sandbox-readonly
  labels:
    app.kubernetes.io/name: hearth-sandbox
    app.kubernetes.io/part-of: hearth
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - pods/log
      - events
      - services
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmrepositories
      - ocirepositories
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - prometheusrules
      - servicemonitors
      - podmonitors
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hearth-sandbox-readonly
  labels:
    app.kubernetes.io/name: hearth-sandbox
    app.kubernetes.io/part-of: hearth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hearth-sandbox-readonly
subjects:
  - kind: ServiceAccount
    name: hearth-sandbox
    namespace: hearth-sandboxes
---
# Hearth controller: create/delete/list sandbox pods (+ get for status).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hearth-sandbox-manager
  namespace: hearth-sandboxes
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/part-of: hearth
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hearth-sandbox-manager
  namespace: hearth-sandboxes
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/part-of: hearth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hearth-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: hearth
    namespace: observability
