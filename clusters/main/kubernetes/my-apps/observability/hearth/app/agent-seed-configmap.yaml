---
# Seed Hermes Agent config on first boot (agent-data PVC). MCP auth from env via ensure-mcp.py.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hearth-agent-seed
  namespace: observability
  labels:
    app.kubernetes.io/name: hearth
    app.kubernetes.io/part-of: hearth
    app.kubernetes.io/component: agent
data:
  config.yaml: |
    model:
      default: qwen3.5:9b
      provider: custom
      base_url: http://ollama.ai.svc.cluster.local:11434/v1
      context_length: 64000
    web:
      search_backend: searxng
    mcp_servers:
      hearth:
        url: http://127.0.0.1:8000/mcp
        timeout: 180
        tools:
          include:
            - sandbox_exec
            - sandbox_status
            - sandbox_ensure
    browser:
      allow_private_urls: true
  ensure-mcp.py: |
    #!/usr/bin/env python3
    """Patch MCP Authorization from HEARTH_SANDBOX_AGENT_API_KEY into config.yaml."""
    import os
    from pathlib import Path
    try:
        import yaml
    except ImportError:
        raise SystemExit(0)
    home = Path(os.environ.get("HERMES_HOME", "/opt/data"))
    cfg_path = home / "config.yaml"
    if not cfg_path.is_file():
        raise SystemExit(0)
    with cfg_path.open(encoding="utf-8") as fh:
        cfg = yaml.safe_load(fh) or {}
    if not isinstance(cfg, dict):
        cfg = {}
    mcp = cfg.setdefault("mcp_servers", {})
    if not isinstance(mcp, dict):
        mcp = {}
        cfg["mcp_servers"] = mcp
    hearth = mcp.setdefault("hearth", {})
    if not isinstance(hearth, dict):
        hearth = {}
        mcp["hearth"] = hearth
    hearth["url"] = os.environ.get("HEARTH_MCP_URL", "http://127.0.0.1:8000/mcp")
    hearth["timeout"] = 180
    hearth.setdefault("tools", {"include": ["sandbox_exec", "sandbox_status", "sandbox_ensure"]})
    key = os.environ.get("HEARTH_SANDBOX_AGENT_API_KEY", "").strip()
    if key:
        hearth["headers"] = {"Authorization": f"Bearer {key}"}
    searx = os.environ.get("SEARXNG_URL", "").strip()
    if searx:
        web = cfg.setdefault("web", {})
        if isinstance(web, dict):
            web["search_backend"] = "searxng"
    with cfg_path.open("w", encoding="utf-8") as fh:
        yaml.safe_dump(cfg, fh, default_flow_style=False, sort_keys=False)
