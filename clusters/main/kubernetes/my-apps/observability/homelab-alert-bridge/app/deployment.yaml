---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-alert-bridge
  namespace: observability
  labels:
    app.kubernetes.io/name: homelab-alert-bridge
    app.kubernetes.io/part-of: homelab-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-alert-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-alert-bridge
    spec:
      containers:
        - name: bridge
          # renovate: datasource=docker depName=ghcr.io/nerddotdad/homelab-alert-bridge
          image: ghcr.io/nerddotdad/homelab-alert-bridge:1.0.0@sha256:27250b52818a74a90197ac1af4e9393a12d4564719a8b1386c811253a859aaa2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: INCIDENT_DIR
              value: /data/incidents
            - name: NTFY_BRIDGE_URL
              value: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
            - name: HERMES_WEBHOOK_URL
              value: http://hermes-oncall-app-template.ai.svc.cluster.local:8644/webhooks/homelab-alerts
            - name: HERMES_WEBHOOK_SECRET
              value: "${HERMES_ALERT_TRIAGE_SECRET}"
            - name: TRIAGE_AUTH_TOKEN
              value: "${HERMES_ALERT_TRIAGE_SECRET}"
          volumeMounts:
            - name: incidents
              mountPath: /data/incidents
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: incidents
          persistentVolumeClaim:
            claimName: homelab-alert-bridge-incidents
