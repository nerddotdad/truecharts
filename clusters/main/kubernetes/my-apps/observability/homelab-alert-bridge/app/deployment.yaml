---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-alert-bridge
  namespace: observability
  labels:
    app.kubernetes.io/name: homelab-alert-bridge
    app.kubernetes.io/part-of: homelab-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-alert-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-alert-bridge
    spec:
      containers:
        - name: bridge
          # renovate: datasource=docker depName=ghcr.io/nerddotdad/homelab-alert-bridge
          image: ghcr.io/nerddotdad/homelab-alert-bridge:1.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: INCIDENT_DIR
              value: /data/incidents
            - name: NTFY_BRIDGE_URL
              value: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
            - name: NTFY_BASE_URL
              value: http://ntfy.observability.svc.cluster.local:10222
            - name: NTFY_TOPIC
              value: homelab-alerts
            - name: PROMETHEUS_URL
              value: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local:9090
            - name: GRAFANA_PUBLIC_URL
              value: https://grafana.${DOMAIN_0}
            - name: NTFY_CLICK_URL
              value: https://ntfy.${DOMAIN_0}/homelab-alerts
            - name: JELLYFIN_DASHBOARD_URL
              value: https://grafana.${DOMAIN_0}/d/603679cbda70a9fe/jellyfin
            - name: HERMES_WEBHOOK_URL
              value: http://hermes-oncall-app-template.ai.svc.cluster.local:8644/webhooks/homelab-alerts
            - name: HERMES_WEBHOOK_SECRET
              value: "${HERMES_ALERT_TRIAGE_SECRET}"
            - name: TRIAGE_AUTH_TOKEN
              value: "${HERMES_ALERT_TRIAGE_SECRET}"
            - name: HERMES_PUBLIC_BASE_URL
              value: "https://hermes.${DOMAIN_0}"
          volumeMounts:
            - name: incidents
              mountPath: /data/incidents
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: incidents
          persistentVolumeClaim:
            claimName: homelab-alert-bridge-incidents
