---
# Fast-path alert for alert-test-fail only (2m). Remove with alert-test/ after validation.
# Production Flux Helm alerts use 10m in homelab-flux.yaml.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-flux-test
  namespace: observability
  labels:
    app.kubernetes.io/part-of: homelab-observability
spec:
  groups:
    - name: homelab.flux.test
      interval: 30s
      rules:
        - alert: HomelabFluxHelmReleaseTestFail
          expr: |
            gotk_resource_info{
              customresource_kind="HelmRelease",
              name="alert-test-fail",
              exported_namespace="observability",
              ready="False",
              suspended!="true"
            } == 1
          for: 2m
          labels:
            severity: critical
            homelab_team: platform
            alert_test: "true"
          annotations:
            summary: "[TEST] observability/alert-test-fail — chart {{ $labels.chart }}{{ $labels.chart_ref }} not ready"
            runbook_url: https://docs.${DOMAIN_0}/main/kubernetes/my-apps/observability/runbooks/mk_runbook_homelab-flux-helmrelease-test-fail/
            recommended_ai_skills: homelab-k8s-flux-triage
            description: |-
              Release: observability/alert-test-fail
              Chart: {{ $labels.chart }}{{ $labels.chart_ref }} (version {{ $labels.chart_version }})
              Deliberate test (nonexistent chart). Pipeline OK if you see this on ntfy.
              Remove observability/alert-test/ and homelab-flux-test.yaml when done.
