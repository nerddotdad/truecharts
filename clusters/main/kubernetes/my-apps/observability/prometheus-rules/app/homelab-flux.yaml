---
# Requires gotk_resource_info (kube-state-metrics Flux CR config) and Flux PodMonitor.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-flux
  namespace: observability
  labels:
    app.kubernetes.io/part-of: homelab-observability
spec:
  groups:
    - name: homelab.flux.resources
      interval: 1m
      rules:
        - alert: HomelabFluxHelmReleaseNotReady
          expr: |
            gotk_resource_info{
              customresource_kind="HelmRelease",
              ready="False",
              suspended!="true"
            } == 1
          for: 10m
          labels:
            severity: critical
            homelab_team: platform
          annotations:
            summary: "HelmRelease {{ $labels.exported_namespace }}/{{ $labels.name }} — chart {{ $labels.chart }}{{ $labels.chart_ref }} not ready"
            runbook_url: https://nerd.dad/latest/homelab/kubernetes/my-apps/observability/runbooks/mk_runbook_homelab-flux-helmrelease-not-ready/
            recommended_ai_skills: homelab-k8s-flux-triage
            description: |-
              Release: {{ $labels.exported_namespace }}/{{ $labels.name }}
              Chart: {{ $labels.chart }}{{ $labels.chart_ref }} (version {{ $labels.chart_version }}, repo {{ $labels.chart_source }})
              Flux HelmRelease Not Ready for 10+ minutes (install/upgrade, chart fetch, or dependency).
              Check: kubectl describe helmrelease {{ $labels.name }} -n {{ $labels.exported_namespace }}
              GitOps path: clusters/main/kubernetes/**/{{ $labels.exported_namespace }}/**/{{ $labels.name }}/

        - alert: HomelabFluxKustomizationNotReady
          expr: |
            gotk_resource_info{
              customresource_kind="Kustomization",
              ready="False",
              suspended!="true"
            } == 1
          for: 15m
          labels:
            severity: critical
            homelab_team: platform
          annotations:
            summary: "Kustomization {{ $labels.exported_namespace }}/{{ $labels.name }} not ready"
            recommended_ai_skills: homelab-k8s-flux-triage
            description: >-
              Flux Kustomization reconciliation is failing. Check: kubectl describe kustomization {{ $labels.name }} -n {{ $labels.exported_namespace }}

        - alert: HomelabFluxSourceNotReady
          expr: |
            gotk_resource_info{
              customresource_kind=~"GitRepository|HelmRepository|OCIRepository|HelmChart",
              ready="False",
              suspended!="true"
            } == 1
          for: 15m
          labels:
            severity: warning
            homelab_team: platform
          annotations:
            summary: "Flux {{ $labels.customresource_kind }} {{ $labels.exported_namespace }}/{{ $labels.name }}{{ if $labels.chart }} — chart {{ $labels.chart }}{{ end }} not ready"
            recommended_ai_skills: homelab-k8s-flux-triage
            description: |-
              Resource: {{ $labels.customresource_kind }} {{ $labels.exported_namespace }}/{{ $labels.name }}
              {{ if $labels.chart }}Chart: {{ $labels.chart }} (version {{ $labels.chart_version }}, source {{ $labels.chart_source }})
              {{ end }}Not ready; downstream HelmReleases/Kustomizations may fail.
              Check: kubectl describe {{ $labels.customresource_kind }}/{{ $labels.name }} -n {{ $labels.exported_namespace }}

        - alert: HomelabFluxResourceUnknown
          expr: |
            gotk_resource_info{
              customresource_kind=~"HelmRelease|Kustomization|GitRepository|HelmRepository|OCIRepository|HelmChart",
              ready="Unknown",
              suspended!="true"
            } == 1
          for: 30m
          labels:
            severity: warning
            homelab_team: platform
          annotations:
            summary: "Flux {{ $labels.customresource_kind }} {{ $labels.exported_namespace }}/{{ $labels.name }} status unknown"
            recommended_ai_skills: homelab-k8s-flux-triage
            description: >-
              Resource has been in Unknown readiness for 30+ minutes.

    - name: homelab.flux.controllers
      interval: 1m
      rules:
        - alert: HomelabFluxControllerReconcileErrors
          expr: |
            sum by (controller) (
              rate(controller_runtime_reconcile_total{namespace="flux-system", result="error"}[5m])
            ) > 0
          for: 10m
          labels:
            severity: warning
            homelab_team: platform
          annotations:
            summary: "Flux controller {{ $labels.controller }} reporting reconcile errors"
            recommended_ai_skills: homelab-k8s-flux-triage
            description: |-
              Controller {{ $labels.controller }} has sustained reconcile errors in flux-system.
              Find failing workloads: kubectl get helmrelease,helmchart,kustomization -A
              Logs: kubectl logs -n flux-system deploy/helm-controller -c manager --tail=50
              (Also check HomelabFluxHelmReleaseNotReady / HomelabFluxSourceNotReady for chart and release names.)

        - alert: HomelabFluxHelmReconcileSlow
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, controller) (
                rate(controller_runtime_reconcile_time_seconds_bucket{namespace="flux-system", controller="helmrelease"}[5m])
              )
            ) > 300
          for: 15m
          labels:
            severity: warning
            homelab_team: platform
          annotations:
            summary: "HelmRelease reconciles are very slow (p99 > 5m)"
            recommended_ai_skills: homelab-k8s-flux-triage
            description: >-
              helm-controller p99 reconcile time exceeds 5 minutes; installs/upgrades may be stuck or overloaded.
