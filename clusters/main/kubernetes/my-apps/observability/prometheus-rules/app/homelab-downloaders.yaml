---
# Downloader *arr metrics: homelab alert replaces noisy kube-prometheus-stack TargetDown in namespace downloaders.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-downloaders
  namespace: observability
  labels:
    app.kubernetes.io/part-of: homelab-observability
spec:
  groups:
    - name: homelab.downloaders
      interval: 30s
      rules:
        - alert: HomelabDownloaderMetricsDown
          expr: |
            up{namespace="downloaders", service=~".+-metrics"} == 0
            or
            up{namespace="downloaders", job=~".+-metrics"} == 0
          for: 20m
          labels:
            severity: warning
            homelab_team: downloaders
          annotations:
            summary: "Downloader metrics down: {{ $labels.service }}{{ $labels.job }} (downloaders)"
            runbook_url: https://nerd.dad/latest/homelab/kubernetes/my-apps/observability/runbooks/mk_runbook_homelab-downloader-metrics-down/
            recommended_ai_skills: homelab-k8s-flux-triage
            description: |-
              Prometheus cannot scrape metrics for {{ $labels.service }}{{ $labels.job }} (job={{ $labels.job }}, service={{ $labels.service }}) in downloaders for 20+ minutes.
              The app UI may still work; the metrics endpoint or ServiceMonitor is unreachable.
              Generic TargetDown in downloaders is suppressed; this alert is the one that notifies ntfy.
