apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  - grafana-dashboards-values.configmap.yaml
  - helm-release.yaml
configMapGenerator:
  - name: grafana-dashboard-homelab-alerts
    files:
      - dashboards/homelab-alerts-overview.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
