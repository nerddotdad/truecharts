apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-values
  namespace: observability
data:
  values.yaml: |
    # Add dashboards under dashboards.grafana.<id> — see mk_observability.md.
    # After editing this ConfigMap, reconcile Grafana so the init container re-downloads JSON:
    #   flux reconcile helmrelease grafana -n observability
    dashboards:
      grafana:
        node-exporter-1860:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          marketplace:
            id: 1860
            revision: 37
        k8s-views-global-15760:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          marketplace:
            id: 15760
            revision: 28
        cert-manager-13407:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          marketplace:
            id: 13407
            revision: 2
        jellyfin-rebelcore:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          url: https://raw.githubusercontent.com/rebelcore/jellyfin_grafana/master/dashboards/jellyfin.json
        homelab-alerts-overview:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          url: https://raw.githubusercontent.com/nerddotdad/truecharts/main/clusters/main/kubernetes/my-apps/observability/grafana/app/dashboards/homelab-alerts-overview.json
