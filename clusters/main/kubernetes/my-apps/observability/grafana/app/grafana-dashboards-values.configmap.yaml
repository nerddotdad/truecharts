apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-values
  namespace: observability
data:
  values.yaml: |
    # Add marketplace/URL dashboards under dashboards.grafana.<id> — see mk_observability.md.
    # Those are fetched only when the Grafana pod restarts (Helm upgrade). Custom homelab
    # dashboards live in labeled ConfigMaps (grafana_dashboard=1) and reload via sidecar.
    dashboards:
      grafana:
        node-exporter-1860:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          marketplace:
            id: 1860
            revision: 37
        k8s-views-global-15760:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          marketplace:
            id: 15760
            revision: 28
        cert-manager-13407:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          marketplace:
            id: 13407
            revision: 2
        jellyfin-rebelcore:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS}
              value: Prometheus
          url: https://raw.githubusercontent.com/rebelcore/jellyfin_grafana/master/dashboards/jellyfin.json
