# Provisioned by Grafana sidecar (label grafana_datasource). Prometheus comes from kube-prometheus-stack
# Helm release name `kube-prometheus-stack` → Service …-prometheus on port 9090.
# If queries fail, run: kubectl get svc -n kube-prometheus-stack | rg prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-prometheus
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  prometheus.yaml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 30s
