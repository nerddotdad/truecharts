---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 15m
  chart:
    spec:
      chart: grafana
      version: 23.4.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  valuesFrom:
    - kind: ConfigMap
      name: grafana-dashboards-values
      valuesKey: values.yaml
  values:
    # TrueCharts ships optional dashboards (cert-manager, etc.) that substitute ${DS_PROMETHEUS} → "Prometheus".
    # The chart does not create that datasource for you; wire Prometheus from kube-prometheus-stack explicitly.
    cnpg:
      main:
        enabled: false

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                GF_DATABASE_TYPE: sqlite3
                GF_DATABASE_SSL_MODE: disable
                GF_SECURITY_ADMIN_USER: admin
                GF_SECURITY_ADMIN_PASSWORD: "${ADMIN_PASS}"
                # Chart defaults use secretKeyRef → cnpg-main-*; Helm merges maps by key, so you must
                # override these or install fails with "Expected … Secret [cnpg-main-urls] to be defined".
                # Empty values drop postgres usage when using SQLite (Grafana ignores these for sqlite3).
                GF_DATABASE_HOST: ""
                GF_DATABASE_PASSWORD: ""
                GF_DATABASE_NAME: ""
                GF_DATABASE_USER: ""
            # Static Prometheus datasource is mounted below; disable the k8s-sidecar that watches
            # labeled ConfigMaps so we do not rely on an emptyDir + separate Flux-managed CM.
            datasources:
              enabled: false

    dashboards:
      grafana:
        nginx-14900:
          enabled: true
          failOnError: false
          b64content: false
          datasource:
            - name: $${DS_PROMETHEUS.INTERNAL-ODMONT.COM}
              value: Prometheus
            - name: $$datasource
              value: Prometheus
          marketplace:
            id: 14900
            revision: 2

    configmap:
      prometheus-kube-datasource:
        enabled: true
        data:
          prometheus.yaml: |-
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                url: http://kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local:9090
                access: proxy
                isDefault: true
                jsonData:
                  httpMethod: POST
                  timeInterval: 30s

    persistence:
      sc-datasource-volume:
        enabled: false
      prometheus-kube-datasource:
        enabled: true
        type: configmap
        objectName: prometheus-kube-datasource
        mountPath: /etc/grafana/provisioning/datasources
        targetSelector:
          main:
            main:
              readOnly: true

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: grafana.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Grafana
            description: Grafana service
            group: observability
            icon: ""
            widget:
              enabled: false