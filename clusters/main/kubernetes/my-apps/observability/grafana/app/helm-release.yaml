---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 15m
  chart:
    spec:
      chart: grafana
      version: 23.3.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    cnpg:
      main:
        enabled: false

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                GF_DATABASE_TYPE: sqlite3
                GF_DATABASE_SSL_MODE: disable
                GF_SECURITY_ADMIN_USER: admin
                GF_SECURITY_ADMIN_PASSWORD: "${ADMIN_PASS}"
                # Chart defaults use secretKeyRef → cnpg-main-*; Helm merges maps by key, so you must
                # override these or install fails with "Expected … Secret [cnpg-main-urls] to be defined".
                # Empty values drop postgres usage when using SQLite (Grafana ignores these for sqlite3).
                GF_DATABASE_HOST: ""
                GF_DATABASE_PASSWORD: ""
                GF_DATABASE_NAME: ""
                GF_DATABASE_USER: ""

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: grafana.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Grafana
            description: Grafana service
            group: observability
            icon: ""
            widget:
              enabled: false