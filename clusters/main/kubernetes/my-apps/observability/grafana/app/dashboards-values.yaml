# Merged into HelmRelease via spec.valuesFrom → ConfigMap `grafana-dashboards-values`.
# Add more dashboards under `dashboards.grafana.<name>` per:
# https://truecharts.org/charts/stable/grafana/dashboards/
#
# Marketplace IDs/revisions: https://grafana.com/grafana/dashboards/<id>
#
# Post-build envsubst: use $$ where Grafana/Helm need a literal $. Input $$ → output $
# (e.g. $${DS_...} → ${DS_...}). Do not SOPS-encrypt this file with a regex that matches `id:`
# or marketplace.id becomes ciphertext and Helm breaks.
dashboards:
    grafana:
        nginx-14900:
            enabled: true
            failOnError: false
            b64content: false
            datasource:
                # Dashboard 14900 __inputs name; must match JSON after envsubst.
                - name: $${DS_PROMETHEUS.INTERNAL-ODMONT.COM}
                  value: Prometheus
                # Panels use this literal; $$ → $ after envsubst.
                - name: $$datasource
                  value: Prometheus
            marketplace:
                id: ENC[AES256_GCM,data:v4ad+yk=,iv:OxDSw3ornE6RqV7bPUahMwr8j5Svb6wnOgv+qeQY9qg=,tag:9ECOjXkE38ArEe1kHoQ2OA==,type:int]
                revision: 2
