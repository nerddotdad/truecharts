apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: external
spec:
  interval: 15m
  chart:
    spec:
      chart: external-service
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 5m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    service:
      main:
        type: ExternalIP
        externalIP: ${NAS_IP}
        useSlice: false
        ports:
          main:
            protocol: http
            port: 30186
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: garage.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Garage
            description: TrueNAS Garage S3 admin UI
            group: "{{ .Release.Namespace }}"
            icon: ""
            widget:
              enabled: false
