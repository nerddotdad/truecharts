apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: comfyui
  namespace: ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.4.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 30m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: mmartial/comfyui-nvidia-docker
      pullPolicy: IfNotPresent
      # Pinned below cluster driver max CUDA (see whisper chart notes). If `nvidia-smi` shows a higher
      # "CUDA Version", you can move to e.g. ubuntu24_cuda12.6-latest or mmartial's `latest`.
      tag: "ubuntu22_cuda12.2-latest"

    securityContext:
      container:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0

    podOptions:
      runtimeClassName: "nvidia"
      tolerations:
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule

    workload:
      main:
        podSpec:
          runtimeClassName: "nvidia"
          containers:
            main:
              enabled: true
              resources:
                requests:
                  nvidia.com/gpu: 1
                  cpu: 2000m
                  memory: 8Gi
                limits:
                  nvidia.com/gpu: 1
                  cpu: 12000m
                  memory: 28Gi
              env:
                USE_UV: "true"
                BASE_DIRECTORY: "/basedir"
                SECURITY_LEVEL: "normal"
                WANTED_UID: "0"
                WANTED_GID: "0"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8188
                  path: /
                  initialDelaySeconds: 120
                  periodSeconds: 15
                  failureThreshold: 80
                liveness:
                  enabled: true
                  type: http
                  port: 8188
                  path: /
                  periodSeconds: 30
                  failureThreshold: 3
                readiness:
                  enabled: true
                  type: http
                  port: 8188
                  path: /
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 6

    persistence:
      # Local block storage (Longhorn) avoids NFS latency and file-locking pain for venv/git/uv
      # during installs and upgrades. Single-node cluster; RWO is fine.
      # Resize PVCs if you outgrow them; use VolSync/restic if you need off-cluster backups.
      run:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 50Gi
        mountPath: "/comfy/mnt"
      basedir:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 200Gi
        mountPath: "/basedir"

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            protocol: tcp
            port: 8188
            targetPort: 8188

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: comfyui.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: comfyui
            description: ComfyUI (GPU)
            group: ai
            icon: ""
            widget:
              enabled: false
