---
# Cluster DNS alias for Ollama — matches ingress host ollama-api.${DOMAIN_0}.
# Hermes and other in-cluster clients should use this or service/ollama:11434.
apiVersion: v1
kind: Service
metadata:
  name: ollama-api
  namespace: ai
  labels:
    app.kubernetes.io/name: ollama-api
    app.kubernetes.io/part-of: ollama
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 11434
      targetPort: 11434
      protocol: TCP
  selector:
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/name: ollama
    pod.name: main
