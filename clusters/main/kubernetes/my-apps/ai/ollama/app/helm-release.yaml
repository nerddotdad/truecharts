apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ai
spec:
  interval: 15m
  chart:
    spec:
      chart: ollama
      version: 9.15.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 10m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    securityContext:
      container:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0

    podOptions:
      runtimeClassName: "nvidia"
      # Tolerate system taints for node initialization (Cilium agent-not-ready and node not-ready)
      tolerations:
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule

    resources:
        requests:
          nvidia.com/gpu: 1
          memory: 6Gi
        limits:
          nvidia.com/gpu: 1
          memory: 24Gi

    workload:
      main:
        type: Deployment
        podSpec:
          runtimeClassName: "nvidia"
          containers:
            main:
              env:
                OLLAMA_HOST: "0.0.0.0:11434"
                OLLAMA_ORIGINS: "*"
                OLLAMA_FLASH_ATTENTION: "1"
                OLLAMA_KEEP_ALIVE: "24h"
                OLLAMA_MAX_LOADED_MODELS: "1"
                OLLAMA_NUM_PARALLEL: "1"
                OLLAMA_KV_CACHE_TYPE: "q8_0"
                OLLAMA_GPU_OVERHEAD: "536870912"
                # qwen3.5:9b — 256K native; tested ~17GB VRAM at 262144 on RTX 3090 (100% GPU)
                OLLAMA_CONTEXT_LENGTH: "262144"
      ui:
        type: Deployment

    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 120Gi
        mountPath: "/root/.ollama"
        targetSelector:
          main:
            main:
              mountPath: "/root/.ollama"
      data:
        enabled: true
        type: nfs
        mountPath: "/app/backend/data"
        path: ${NFS_APPS}/ollama/data
        server: ${NAS_IP}
        targetSelector:
          ui:
            ui:
              mountPath: "/app/backend/data"

    ingress:
      main:
        primary: true
        enabled: true
        ingressClassName: external
        hosts:
          - host: ollama.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
          homepage:
            enabled: true
            name: ollama
            description: Ollama LLM (qwen3.5:9b, 256K ctx, GPU)
            group: ai
            icon: ""
            widget:
              enabled: false
      api:
        enabled: true
        ingressClassName: external
        hosts:
          - host: ollama-api.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: "domain-0-le-prod"
