# One-time model pull for GitOps bootstrap.
# Default model: qwen3.5:9b (Hermes Guide pick; 256K native, 64K+ with OLLAMA_CONTEXT_LENGTH on RTX 3090).
# - Do not use ${VAR} in the script: Flux postBuild substitutes clusterenv keys and breaks shell vars.
# - Job spec.template is immutable: delete before changing the script or model:
#   kubectl delete job -n ai ollama-model-pull-job
# - Large pulls may run >12h; KubeJobNotCompleted is suppressed for this job_name (see homelab-ai PrometheusRule).
#   Delete the Job after success so metrics/alerts clear: kubectl delete job ollama-model-pull-job -n ai
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull-job
  namespace: ai
  labels:
    homelab.dev/bootstrap-job: "true"
spec:
  # Stop runaway pulls; adjust if you add much larger models.
  activeDeadlineSeconds: 172800
  ttlSecondsAfterFinished: 604800
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: pull
          image: curlimages/curl:8.12.1
          command:
            - sh
            - -c
            - |
              set -e
              OLLAMA_API=http://ollama-api.ai.svc.cluster.local:11434
              until curl -sf "$OLLAMA_API/api/tags" >/dev/null; do
                echo "waiting for ollama API..."
                sleep 10
              done
              echo "pulling qwen3.5:9b (this may take a while)..."
              curl -sf "$OLLAMA_API/api/pull" -d '{"name":"qwen3.5:9b"}'
              echo "pull complete"
              echo "pulling windffooxxyang1130764/mesugaki-R18G:latest..."
              curl -sf "$OLLAMA_API/api/pull" -d '{"name":"windffooxxyang1130764/mesugaki-R18G:latest"}'
              echo "pull complete"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
