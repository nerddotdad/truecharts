---
# Hermes Agent + WebUI — on-call triage at https://hermes.${DOMAIN_0}
# Image: custom_images/hermes-homelab (ghcr.io/nerddotdad/hermes-homelab) — build via Build Custom Docker Images workflow.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-oncall
  namespace: ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.6.3
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 15m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    podOptions:
      securityContext:
        # Hermes WebUI image uses UID/GID 1024 (see upstream Dockerfile).
        fsGroup: 1024

    # Pre-created SA + ClusterRole in rbac.yaml — do not let the chart create one.
    serviceAccount:
      main:
        enabled: false

    image:
      repository: ghcr.io/nerddotdad/hermes-homelab
      pullPolicy: IfNotPresent
      tag: latest

    workload:
      main:
        podSpec:
          # GitOps ServiceAccount (see rbac.yaml), not chart-generated.
          overrideServiceAccountName: hermes-oncall
          containers:
            main:
              enabled: true
              env:
                HERMES_WEBUI_HOST: "0.0.0.0"
                HERMES_WEBUI_PORT: "8787"
                HERMES_WEBUI_PASSWORD: "${ADMIN_PASS}"
                HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
                HERMES_HOME: /home/hermeswebui/.hermes
                HERMES_OPTIONAL_SKILLS_DIR: /opt/homelab-skills
                HERMES_WEBUI_EXTENSION_DIR: /opt/hermes-extensions
                HERMES_WEBUI_PREFILL_MESSAGES_SCRIPT: python3 /opt/homelab-scripts/alert_prefill.py
                HERMES_WEBUI_PREFILL_MESSAGES_SCRIPT_TIMEOUT: "5"
                INCIDENT_API_BASE: http://homelab-alert-bridge.observability.svc.cluster.local:8000/homelab/api/incidents
                WANTED_UID: "1024"
                WANTED_GID: "1024"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 30
                  periodSeconds: 10
                liveness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 60
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 15
                  periodSeconds: 10
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                limits:
                  memory: 4Gi

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8787
            protocol: tcp
            targetPort: 8787

    persistence:
      hermes-data:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        mountPath: /home/hermeswebui/.hermes
        readOnly: false
        targetSelectAll: true

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: hermes.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Hermes on-call
            description: Hermes Agent WebUI — alert triage with persistent memory
            group: ai
            icon: mdi-robot-happy-outline
            href: https://hermes.${DOMAIN_0}
            widget:
              enabled: false
