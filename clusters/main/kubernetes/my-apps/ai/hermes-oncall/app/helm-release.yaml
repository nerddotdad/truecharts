---
# Hermes Agent + WebUI — on-call triage at https://hermes.${DOMAIN_0}
# Image: custom_images/hermes-homelab (ghcr.io/nerddotdad/hermes-homelab) — build via Build Custom Docker Images workflow.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-oncall
  namespace: ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.6.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 15m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Hermes entrypoint must start as root (hermeswebuitoo) to usermod → UID 1024 on the PVC.
    # TrueCharts defaults (runAsUser 568 + RO rootfs) block hermeswebui_init.bash.
    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        allowPrivilegeEscalation: true
      pod:
        fsGroup: 1024

    # Pre-created SA + ClusterRole in rbac.yaml — do not let the chart create one.
    serviceAccount:
      main:
        enabled: false

    image:
      repository: ghcr.io/nerddotdad/hermes-homelab
      pullPolicy: IfNotPresent
      # renovate: datasource=docker depName=ghcr.io/nerddotdad/hermes-homelab
      tag: 1.1.9

    workload:
      main:
        podSpec:
          # GitOps SA + token mount (see rbac.yaml). TrueCharts defaults automount to false.
          serviceAccountName: hermes-oncall
          automountServiceAccountToken: true
          # Bump when editing agent-config/ SOUL or skills (always synced). USER is seed-only.
          annotations:
            homelab.agent-config/version: "10"
          initContainers:
            sync-agent-gitops:
              enabled: true
              type: init
              imageSelector: ubuntuImage
              # Path contract — anchors defined here; main container and persistence reuse them.
              env:
                HERMES_HOME: &hermes_home /home/hermeswebui/.hermes
                HOMELAB_GITOPS_AGENT_DIR: &gitops_agent /opt/hermes-gitops
                HOMELAB_GITOPS_SKILL_DIR: &gitops_skill /opt/homelab-skills/homelab-k8s-flux-triage
                HOMELAB_GITOPS_SKILL_NAME: homelab-k8s-flux-triage
                HERMES_OPTIONAL_SKILLS_DIR: &skills_root /opt/homelab-skills
              command:
                - /bin/sh
                - -ec
                - |
                  # Literal paths only — Flux postBuild strips ${VAR} not in clusterenv (would break cp).
                  mkdir -p /home/hermeswebui/.hermes/memories \
                    /home/hermeswebui/.hermes/skills/homelab-k8s-flux-triage \
                    /home/hermeswebui/.hermes/skills/jellyfin-api
                  cp -f /opt/hermes-gitops/SOUL.md /home/hermeswebui/.hermes/SOUL.md
                  cp -f /opt/homelab-skills/homelab-k8s-flux-triage/SKILL.md \
                    /home/hermeswebui/.hermes/skills/homelab-k8s-flux-triage/SKILL.md
                  cp -f /opt/homelab-skills/jellyfin-api/SKILL.md \
                    /home/hermeswebui/.hermes/skills/jellyfin-api/SKILL.md
                  if [ ! -s /home/hermeswebui/.hermes/memories/USER.md ]; then
                    cp -f /opt/hermes-gitops/USER.md /home/hermeswebui/.hermes/memories/USER.md
                  fi
          containers:
            main:
              enabled: true
              securityContext:
                readOnlyRootFilesystem: false
                runAsNonRoot: false
                runAsUser: 0
                runAsGroup: 0
                allowPrivilegeEscalation: true
              env:
                HERMES_WEBUI_HOST: "0.0.0.0"
                HERMES_WEBUI_PORT: "8787"
                HERMES_WEBUI_PASSWORD: "${ADMIN_PASS}"
                HERMES_HOME: *hermes_home
                HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
                HOMELAB_GITOPS_AGENT_DIR: *gitops_agent
                HOMELAB_GITOPS_SKILL_DIR: *gitops_skill
                HOMELAB_GITOPS_SKILL_NAME: homelab-k8s-flux-triage
                HERMES_OPTIONAL_SKILLS_DIR: *skills_root
                # Baked into hermes-homelab image at /opt/hermes (see custom_images/hermes-homelab/Dockerfile).
                HERMES_WEBUI_AGENT_DIR: /opt/hermes
                # uv pip install puts hermes-agent in venv; bundled plugins (web_search, etc.) live under /opt/hermes/plugins.
                HERMES_BUNDLED_PLUGINS: /opt/hermes/plugins
                HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
                # alert-handoff.js (custom_images/hermes-homelab/extensions/) — ntfy Ask AI deep links.
                HERMES_WEBUI_EXTENSION_DIR: /opt/hermes-extensions
                HERMES_WEBUI_EXTENSION_SCRIPT_URLS: /extensions/alert-handoff.js
                # ntfy Ask AI → homelab-alert-bridge → Hermes webhook (see start-gateway.sh).
                WEBHOOK_ENABLED: "true"
                WEBHOOK_PORT: "8644"
                WEBHOOK_SECRET: "${HERMES_ALERT_TRIAGE_SECRET}"
                HERMES_WEBHOOK_SECRET: "${HERMES_ALERT_TRIAGE_SECRET}"
                # Homelab docs + dashboards (for agent citations; Flux substitutes DOMAIN_0).
                HOMELAB_DOCS_BASE_URL: "https://docs.${DOMAIN_0}/main/kubernetes"
                HOMELAB_GRAFANA_URL: "https://grafana.${DOMAIN_0}"
                # Jellyfin API (same key as Homepage widget HP_JELLYFIN in clusterenv.yaml).
                JELLYFIN_API_TOKEN: "${HP_JELLYFIN}"
                JELLYFIN_API_URL: "http://jellyfin.media.svc.cluster.local:8096"
                JELLYFIN_PUBLIC_URL: "https://jellyfin.${DOMAIN_0}"
                # Hermes web_search → cluster SearXNG (JSON API verified on :8080).
                SEARXNG_URL: "http://searxng.ai.svc.cluster.local:8080"
                WANTED_UID: "1024"
                # Match fsGroup / PVC; init may auto-detect GID from an existing volume.
                WANTED_GID: "1024"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  # First boot runs uv pip install for hermes-agent (can take several minutes).
                  initialDelaySeconds: 90
                  periodSeconds: 15
                  failureThreshold: 24
                liveness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 60
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 15
                  periodSeconds: 10
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                limits:
                  memory: 4Gi

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8787
            protocol: tcp
            targetPort: 8787
          webhook:
            enabled: true
            port: 8644
            protocol: tcp
            targetPort: 8644

    persistence:
      hermes-data:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        mountPath: *hermes_home
        readOnly: false
        targetSelector:
          main:
            main: {}
            sync-agent-gitops: {}
      workspace:
        enabled: true
        type: emptyDir
        mountPath: /workspace
        targetSelectAll: true
      # GitOps agent files (ConfigMap → staging dir; init copies into $HERMES_HOME).
      homelab-agent:
        enabled: true
        type: configmap
        objectName: hermes-oncall-agent
        expandObjectName: false
        readOnly: true
        mountPath: *gitops_agent
        targetSelector:
          main:
            sync-agent-gitops: {}
      homelab-skills:
        enabled: true
        type: configmap
        objectName: hermes-oncall-skills
        expandObjectName: false
        readOnly: true
        mountPath: *skills_root
        items:
          - key: homelab-k8s-flux-triage.SKILL.md
            path: homelab-k8s-flux-triage/SKILL.md
          - key: jellyfin-api.SKILL.md
            path: jellyfin-api/SKILL.md
        targetSelector:
          main:
            main: {}
            sync-agent-gitops: {}

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: hermes.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Hermes on-call
            description: Hermes Agent WebUI — alert triage with persistent memory
            group: ai
            icon: mdi-robot-happy-outline
            href: https://hermes.${DOMAIN_0}
            widget:
              enabled: false
