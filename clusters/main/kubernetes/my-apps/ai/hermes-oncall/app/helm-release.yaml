---
# Hermes Agent + WebUI — on-call triage at https://hermes.${DOMAIN_0}
# Agent config (SOUL, skills, profiles, model) lives on the hermes-data PVC — edit via WebUI/dashboard or kubectl exec.
# Image: custom_images/hermes-homelab (ghcr.io/nerddotdad/hermes-homelab) — build via Build Custom Docker Images workflow.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-oncall
  namespace: ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.6.9
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 15m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    credentials:
      truenas_garage:
        type: s3
        url: "${GARAGE_URL}"
        region: garage
        bucket: truecharts
        accessKey: "${GARAGE_ACCESS_KEY_ID}"
        secretKey: "${GARAGE_SECRET_ACCESS_KEY}"
        encrKey: "${ADMIN_PASS}"
    # Hermes entrypoint must start as root (hermeswebuitoo) to usermod → UID 1024 on the PVC.
    # TrueCharts defaults (runAsUser 568 + RO rootfs) block hermeswebui_init.bash.
    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        allowPrivilegeEscalation: true
      pod:
        fsGroup: 1024

    # Pre-created SA + ClusterRole in rbac.yaml — do not let the chart create one.
    serviceAccount:
      main:
        enabled: false

    image:
      repository: ghcr.io/nerddotdad/hermes-homelab
      pullPolicy: IfNotPresent
      # renovate: datasource=docker depName=ghcr.io/nerddotdad/hermes-homelab
      tag: 1.1.30

    workload:
      main:
        podSpec:
          # GitOps SA + token mount (see rbac.yaml). TrueCharts defaults automount to false.
          serviceAccountName: hermes-oncall
          automountServiceAccountToken: true
          containers:
            main:
              enabled: true
              securityContext:
                readOnlyRootFilesystem: false
                runAsNonRoot: false
                runAsUser: 0
                runAsGroup: 0
                allowPrivilegeEscalation: true
              env:
                HERMES_WEBUI_HOST: "0.0.0.0"
                HERMES_WEBUI_PORT: "8787"
                HERMES_WEBUI_PASSWORD: "${ADMIN_PASS}"
                HERMES_HOME: &hermes_home /home/hermeswebui/.hermes
                HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
                # Baked into hermes-homelab image at /opt/hermes (see custom_images/hermes-homelab/Dockerfile).
                HERMES_WEBUI_AGENT_DIR: /opt/hermes
                # WebUI installs agent into /app/venv; packaged skills live at /app/venv/skills which
                # is_excluded_skill_path rejects (path component "venv"). Point sync at repo checkout.
                HERMES_BUNDLED_SKILLS: /opt/hermes/skills
                # uv pip install puts hermes-agent in venv; bundled plugins (web_search, etc.) live under /opt/hermes/plugins.
                HERMES_BUNDLED_PLUGINS: /opt/hermes/plugins
                HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
                # alert-handoff.js (custom_images/hermes-homelab/extensions/) — ntfy Ask AI deep links.
                HERMES_WEBUI_EXTENSION_DIR: /opt/hermes-extensions
                HERMES_WEBUI_EXTENSION_SCRIPT_URLS: /extensions/alert-handoff.js
                # ntfy Ask AI → homelab-alert-bridge → Hermes webhook (see start-gateway.sh).
                WEBHOOK_ENABLED: "true"
                WEBHOOK_PORT: "8644"
                WEBHOOK_SECRET: "${HERMES_ALERT_TRIAGE_SECRET}"
                HERMES_WEBHOOK_SECRET: "${HERMES_ALERT_TRIAGE_SECRET}"
                # Homelab docs + dashboards (for agent citations; Flux substitutes DOMAIN_0).
                HOMELAB_DOCS_BASE_URL: "https://docs.${DOMAIN_0}/main/kubernetes"
                HOMELAB_GRAFANA_URL: "https://grafana.${DOMAIN_0}"
                # Jellyfin API (same key as Homepage widget HP_JELLYFIN in clusterenv.yaml).
                JELLYFIN_API_TOKEN: "${HP_JELLYFIN}"
                JELLYFIN_API_URL: "http://jellyfin.media.svc.cluster.local:8096"
                JELLYFIN_PUBLIC_URL: "https://jellyfin.${DOMAIN_0}"
                # Hermes web_search → cluster SearXNG (JSON API verified on :8080).
                SEARXNG_URL: "http://searxng.ai.svc.cluster.local:8080"
                # Hermes Agent management dashboard (config, logs, skills, gateway status).
                DASHBOARD_ENABLED: "true"
                DASHBOARD_PORT: "9119"
                GATEWAY_HEALTH_URL: "http://127.0.0.1:8644"
                HERMES_DASHBOARD_PUBLIC_URL: "https://hermes-dash.${DOMAIN_0}"
                HERMES_DASHBOARD_TUI: "1"
                WANTED_UID: "1024"
                # Match fsGroup / PVC; init may auto-detect GID from an existing volume.
                WANTED_GID: "1024"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  # Venv pre-baked in hermes-homelab image; allow time for rsync + WebUI bind.
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 18
                liveness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 60
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 15
                  periodSeconds: 10
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                limits:
                  memory: 4Gi

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8787
            protocol: tcp
            targetPort: 8787
          webhook:
            enabled: true
            port: 8644
            protocol: tcp
            targetPort: 8644
          dashboard:
            enabled: true
            port: 9119
            protocol: tcp
            targetPort: 9119

    persistence:
      hermes-data:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        mountPath: *hermes_home
        readOnly: false
        # VolSync must be enabled when the PVC is first created (dataSource is immutable).
        # To add VolSync to an existing deployment: Longhorn-snapshot the PVC, uninstall Hermes,
        # delete hermes-oncall-app-template-hermes-data, reconcile, then restore data onto the new PVC.
        volsync:
          - name: hermes-data
            type: restic
            credentials: truenas_garage
            cleanupTempPVC: true
            dest:
              enabled: true
            src:
              enabled: true
              trigger:
                schedule: "30 1 * * *"
      workspace:
        enabled: true
        type: emptyDir
        mountPath: /workspace
        targetSelectAll: true

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: hermes.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Hermes on-call
            description: Hermes Agent WebUI — alert triage with persistent memory
            group: ai
            icon: mdi-robot-happy-outline
            href: https://hermes.${DOMAIN_0}
            widget:
              enabled: false
      dashboard:
        enabled: true
        ingressClassName: external
        targetSelector:
          main: dashboard
        hosts:
          - host: hermes-dash.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Hermes dashboard
            description: Hermes Agent config, logs, skills, and gateway status
            group: ai
            icon: mdi-view-dashboard-outline
            href: https://hermes-dash.${DOMAIN_0}
            widget:
              enabled: false
