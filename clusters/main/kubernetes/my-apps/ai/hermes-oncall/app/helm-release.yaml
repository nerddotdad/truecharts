---
# Hermes Agent + WebUI — on-call triage at https://hermes.${DOMAIN_0}
# Image: custom_images/hermes-homelab (ghcr.io/nerddotdad/hermes-homelab) — build via Build Custom Docker Images workflow.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-oncall
  namespace: ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.6.3
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 15m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Hermes entrypoint must start as root (hermeswebuitoo) to usermod → UID 1024 on the PVC.
    # TrueCharts defaults (runAsUser 568 + RO rootfs) block hermeswebui_init.bash.
    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        allowPrivilegeEscalation: true
      pod:
        fsGroup: 1024

    # Pre-created SA + ClusterRole in rbac.yaml — do not let the chart create one.
    serviceAccount:
      main:
        enabled: false

    image:
      repository: ghcr.io/nerddotdad/hermes-homelab
      pullPolicy: IfNotPresent
      # renovate: datasource=docker depName=ghcr.io/nerddotdad/hermes-homelab
      tag: 1.0.1@sha256:df1a49d99acaa94eb9a2b7cb4c23f1080475e532a372a699ed2573f865122c84

    workload:
      main:
        podSpec:
          # GitOps ServiceAccount (see rbac.yaml), not chart-generated.
          overrideServiceAccountName: hermes-oncall
          containers:
            main:
              enabled: true
              securityContext:
                readOnlyRootFilesystem: false
                runAsNonRoot: false
                runAsUser: 0
                runAsGroup: 0
                allowPrivilegeEscalation: true
              env:
                HERMES_WEBUI_HOST: "0.0.0.0"
                HERMES_WEBUI_PORT: "8787"
                HERMES_WEBUI_PASSWORD: "${ADMIN_PASS}"
                HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
                HERMES_HOME: /home/hermeswebui/.hermes
                # Baked into hermes-homelab image at /opt/hermes (see custom_images/hermes-homelab/Dockerfile).
                HERMES_WEBUI_AGENT_DIR: /opt/hermes
                HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
                HERMES_OPTIONAL_SKILLS_DIR: /opt/homelab-skills
                HERMES_WEBUI_EXTENSION_DIR: /opt/hermes-extensions
                HERMES_WEBUI_EXTENSION_SCRIPT_URLS: /extensions/alert-handoff.js
                HERMES_WEBUI_PREFILL_MESSAGES_SCRIPT: python3 /opt/homelab-scripts/alert_prefill.py
                HERMES_WEBUI_PREFILL_MESSAGES_SCRIPT_TIMEOUT: "5"
                INCIDENT_API_BASE: http://homelab-alert-bridge.observability.svc.cluster.local:8000/homelab/api/incidents
                WANTED_UID: "1024"
                # Match fsGroup / PVC; init may auto-detect GID from an existing volume.
                WANTED_GID: "1024"
              probes:
                startup:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  # First boot runs uv pip install for hermes-agent (can take several minutes).
                  initialDelaySeconds: 90
                  periodSeconds: 15
                  failureThreshold: 24
                liveness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 60
                  periodSeconds: 30
                readiness:
                  enabled: true
                  type: http
                  port: 8787
                  path: /health
                  initialDelaySeconds: 15
                  periodSeconds: 10
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                limits:
                  memory: 4Gi

    service:
      main:
        enabled: true
        ports:
          main:
            enabled: true
            port: 8787
            protocol: tcp
            targetPort: 8787

    persistence:
      hermes-data:
        enabled: true
        type: pvc
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        mountPath: /home/hermeswebui/.hermes
        readOnly: false
        targetSelectAll: true
      workspace:
        enabled: true
        type: emptyDir
        mountPath: /workspace
        targetSelectAll: true

    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: hermes.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
          homepage:
            enabled: true
            name: Hermes on-call
            description: Hermes Agent WebUI — alert triage with persistent memory
            group: ai
            icon: mdi-robot-happy-outline
            href: https://hermes.${DOMAIN_0}
            widget:
              enabled: false
