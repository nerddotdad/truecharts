apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - rbac.yaml
  - helm-release.yaml

configMapGenerator:
  - name: hermes-oncall-agent
    files:
      - SOUL.md=agent-config/SOUL.md
      - USER.md=agent-config/USER.md
      - model.yaml=agent-config/model.yaml
  - name: hermes-oncall-skills
    files:
      - homelab-k8s-flux-triage.SKILL.md=agent-config/skills/homelab-k8s-flux-triage/SKILL.md
      - jellyfin-api.SKILL.md=agent-config/skills/jellyfin-api/SKILL.md
  - name: hermes-oncall-profiles
    files:
      - gemma4.config.yaml=agent-profiles/gemma4/config.yaml

generatorOptions:
  disableNameSuffixHash: true
