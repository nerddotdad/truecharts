---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
# Staff-style clusters use chart defaults only (see alfi0812/talos spegel HelmRelease). If Spegel stays
# 0/1 with "routing table is empty after bootstrapping" on Talos+Cilium, add values — e.g.
# podOptions.hostNetwork: true — see https://github.com/spegel-org/spegel/issues/1256
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: spegel
spec:
  interval: 30m
  chart:
    spec:
      chart: spegel
      version: 5.3.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values: {}