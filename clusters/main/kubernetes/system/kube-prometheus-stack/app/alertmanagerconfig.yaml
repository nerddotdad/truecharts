---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: homelab
  namespace: kube-prometheus-stack
spec:
  route:
    groupBy: ["alertname", "namespace", "severity"]
    groupInterval: 1m
    groupWait: 30s
    receiver: homelab-webhook
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: "null"
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      # HomelabDownloaderMetricsDown (20m) replaces generic TargetDown for *arr metrics.
      - receiver: "null"
        matchers:
          - name: alertname
            value: TargetDown
            matchType: =
          - name: namespace
            value: downloaders
            matchType: =
      # ollama-model-pull-job can run many hours; HomelabOllamaModelPullStuck (36h) replaces 12h KubeJobNotCompleted.
      - receiver: "null"
        matchers:
          - name: alertname
            value: KubeJobNotCompleted
            matchType: =
          - name: job_name
            value: ollama-model-pull-job
            matchType: =
      # HomelabKubeJobFailedOllamaModelPull carries homelab runbook_url for ntfy buttons.
      - receiver: "null"
        matchers:
          - name: alertname
            value: KubeJobFailed
            matchType: =
          - name: job_name
            value: ollama-model-pull-job
            matchType: =
  inhibitRules:
    - equal: ["alertname", "namespace"]
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: "null"
    - name: homelab-webhook
      webhookConfigs:
        # Formats Alertmanager JSON → readable ntfy title/message (topic: homelab-alerts)
        - url: http://hearth.observability.svc.cluster.local:8000/hook
          sendResolved: true
          maxAlerts: 10
