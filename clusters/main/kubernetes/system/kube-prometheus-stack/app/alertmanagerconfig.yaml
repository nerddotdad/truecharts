---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: homelab
  namespace: kube-prometheus-stack
spec:
  route:
    groupBy: ["alertname", "namespace", "severity"]
    groupInterval: 10m
    groupWait: 30s
    receiver: homelab-webhook
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: "null"
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
  inhibitRules:
    - equal: ["alertname", "namespace"]
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: "null"
    - name: homelab-webhook
      webhookConfigs:
        # Formats Alertmanager JSON → readable ntfy title/message (topic: homelab-alerts)
        - url: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
          sendResolved: true
          maxAlerts: 10
