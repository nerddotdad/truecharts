---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugin-gpu
  namespace: system
spec:
  interval: 30m
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.34.1
      sourceRef:
        kind: HelmRepository
        name: home-ops-mirror
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: intel-device-plugin-operator
      namespace: system
  values:
    name: intel-gpu-plugin
    sharedDevNum: 5
    # Helm merges chart defaults with values — nodeSelector: {} does NOT clear the chart default
    # (GpuDevicePlugin keeps intel.feature.node.kubernetes.io/gpu). Set that key to null to drop it,
    # and match nodes where NFD sees Intel VGA (0300/8086). Same idea as TrueCharts + Talos without
    # needing the NodeFeatureRule i915/xe module labels.
    nodeSelector:
      feature.node.kubernetes.io/pci-0300_8086.present: "true"
      intel.feature.node.kubernetes.io/gpu: null
    # When true, chart layers extra NodeFeatureRule / selectors (often breaks on Talos).
    nodeFeatureRule: false