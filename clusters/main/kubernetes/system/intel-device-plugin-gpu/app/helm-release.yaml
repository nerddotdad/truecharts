---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugin-gpu
  namespace: system
spec:
  interval: 30m
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.34.1
      sourceRef:
        kind: HelmRepository
        name: home-ops-mirror
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: intel-device-plugin-operator
      namespace: system
  values:
    name: intel-gpu-plugin
    sharedDevNum: 5
    # Chart default is nodeSelector: { intel.feature.node.kubernetes.io/gpu: "true" } (Talos often
    # never gets that label). Empty map = no selector, fine for a single-node cluster; add labels
    # here again if you expand to multiple nodes and need to pin Intel GPU nodes only.
    nodeSelector: {}
    # When true, chart layers extra NodeFeatureRule / selectors (often breaks on Talos).
    nodeFeatureRule: false