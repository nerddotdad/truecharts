---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugin-gpu
  namespace: system
spec:
  interval: 30m
  chart:
    spec:
      chart: intel-device-plugins-gpu
      version: 0.34.1
      sourceRef:
        kind: HelmRepository
        name: home-ops-mirror
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: intel-device-plugin-operator
      namespace: system
  values:
    name: intel-gpu-plugin
    sharedDevNum: 5
    # Default selector requires intel.feature.node.kubernetes.io/gpu=true, which only appears when the
    # bundled NodeFeatureRule matches PCI Intel AND kernel module i915/xe is visible to NFD — often false on Talos
    # until modules bind; your node already has feature.node.kubernetes.io/pci-0300_8086.present=true from NFD.
    nodeSelector:
      feature.node.kubernetes.io/pci-0300_8086.present: "true"
    nodeFeatureRule: true