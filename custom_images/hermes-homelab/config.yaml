# Seeded on first boot when ~/.hermes/config.yaml is missing (see helm-release initContainer).
model:
  default: qwen3.5:9b
  provider: custom
  base_url: http://ollama.ai.svc.cluster.local:11434/v1
  context_length: 64000

# Web search via in-cluster SearXNG (Service searxng:8080). Search-only — use curl/browser
# for homelab MkDocs pages (see homelab-k8s-flux-triage skill).
web:
  search_backend: searxng

# Agent terminal inherits only vars listed here (empty = none). Patched on boot by ensure-homelab-config.py.
terminal:
  env_passthrough:
    - JELLYFIN_API_TOKEN
    - JELLYFIN_API_URL
    - JELLYFIN_PUBLIC_URL
    - HOMELAB_DOCS_BASE_URL
    - HOMELAB_GRAFANA_URL
    - SEARXNG_URL
    - HERMES_HOME

browser:
  allow_private_urls: true

platforms:
  webhook:
    enabled: true
    extra:
      host: "0.0.0.0"
      port: 8644
