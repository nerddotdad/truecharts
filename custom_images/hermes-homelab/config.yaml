# Seeded on first boot when ~/.hermes/config.yaml is missing (see helm-release initContainer).
model:
  default: qwen3.5:9b
  provider: custom
  base_url: http://ollama.ai.svc.cluster.local:11434/v1
  context_length: 64000

webui_prefill_messages_script:
  - python3
  - /opt/homelab-scripts/alert_prefill.py
webui_prefill_messages_script_timeout: 5
