name: Build Custom Docker Images

on:
  push:
    paths:
      - 'custom_images/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (leave empty for all)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changes.outputs.images }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2

      - name: Detect changed images
        id: changes
        run: |
          skip_homelab_docs() {
            [ "$1" = "homelab-docs" ]
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.image }}" ]; then
              if skip_homelab_docs "${{ github.event.inputs.image }}"; then
                IMAGES="[]"
              else
                IMAGES="[\"${{ github.event.inputs.image }}\"]"
              fi
            else
              IMAGES=$(find custom_images -name Dockerfile -type f \
                | sed 's|custom_images/||' | sed 's|/Dockerfile||' \
                | grep -vx 'homelab-docs' \
                | jq -R . | jq -s -c .)
            fi
            echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=""
          if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -E '^custom_images/[^/]+/' || true)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
              | grep -E '^custom_images/[^/]+/' || true)
          fi

          if [ -n "$CHANGED_FILES" ]; then
            VALID_IMAGES=""
            for img in $(echo "$CHANGED_FILES" | sed 's|^custom_images/||' | cut -d'/' -f1 | sort -u); do
              if skip_homelab_docs "$img"; then
                continue
              fi
              # Skip [skip ci] VERSION-only commits (no rebuild loop)
              real_changes=$(echo "$CHANGED_FILES" | grep -E "^custom_images/${img}/" | grep -vE '/VERSION$' || true)
              if [ -z "$real_changes" ]; then
                continue
              fi
              if [ -f "custom_images/$img/Dockerfile" ]; then
                VALID_IMAGES="${VALID_IMAGES}${VALID_IMAGES:+$'\n'}$img"
              fi
            done
            CHANGED="$VALID_IMAGES"
          fi

          if [ -n "$CHANGED" ]; then
            IMAGES=$(echo "$CHANGED" | jq -R . | jq -s -c .)
          else
            echo "No image directories changed. Use workflow_dispatch to rebuild."
            IMAGES="[]"
          fi
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.images != '' && needs.detect-changes.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect-changes.outputs.images) }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and bump VERSION
        id: version
        run: |
          set -euo pipefail
          vf="custom_images/${{ matrix.image }}/VERSION"
          if [ ! -f "$vf" ]; then
            echo "1.0.0" > "$vf"
          fi
          ver=$(tr -d '[:space:]' < "$vf")
          version_changed=false
          if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- "$vf" | grep -q .; then
              version_changed=true
            fi
          fi
          if [ "$version_changed" = false ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            IFS=. read -r ma mi pa <<< "$ver"
            ver="${ma}.${mi}.$((pa + 1))"
            echo "$ver" > "$vf"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Publishing ${{ matrix.image }}:$ver"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./custom_images/${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Commit VERSION file
        run: |
          set -euo pipefail
          vf="custom_images/${{ matrix.image }}/VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$vf"
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore(custom_images): bump ${{ matrix.image }} to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Summary
        run: |
          echo "Published ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}"
          echo "Digest: ${{ steps.meta.outputs.digest }}"
          echo "Renovate will open a PR updating cluster pins (helm-release.yaml / deployment.yaml)."
