name: Build Custom Docker Images

on:
  push:
    paths:
      - 'custom_images/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (leave empty for all)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.changes.outputs.images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Detect changed images
        id: changes
        run: |
          skip_homelab_docs() {
            [ "$1" = "homelab-docs" ]
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.image }}" ]; then
              if skip_homelab_docs "${{ github.event.inputs.image }}"; then
                IMAGES="[]"
              else
                IMAGES="[\"${{ github.event.inputs.image }}\"]"
              fi
            else
              IMAGES=$(find custom_images -name Dockerfile -type f \
                | sed 's|custom_images/||' | sed 's|/Dockerfile||' \
                | grep -vx 'homelab-docs' \
                | jq -R . | jq -s -c .)
            fi
            echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=""
          if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -E '^custom_images/[^/]+/' || true)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
              | grep -E '^custom_images/[^/]+/' || true)
          fi

          if [ -n "$CHANGED_FILES" ]; then
            VALID_IMAGES=""
            for img in $(echo "$CHANGED_FILES" | sed 's|^custom_images/||' | cut -d'/' -f1 | sort -u); do
              if skip_homelab_docs "$img"; then
                continue
              fi
              if [ -f "custom_images/$img/Dockerfile" ]; then
                VALID_IMAGES="${VALID_IMAGES}${VALID_IMAGES:+$'\n'}$img"
              fi
            done
            CHANGED="$VALID_IMAGES"
          fi

          if [ -n "$CHANGED" ]; then
            IMAGES=$(echo "$CHANGED" | jq -R . | jq -s -c .)
          else
            echo "No image directories changed. Use workflow_dispatch to rebuild."
            IMAGES="[]"
          fi
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.images != '' && needs.detect-changes.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect-changes.outputs.images) }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine semver
        id: semver
        uses: PaulHatch/semantic-version@a8f8f59fd7f0625188492e945240f12d7ad2dca3 # v5.4.0
        with:
          tag_prefix: ""
          namespace: ${{ matrix.image }}
          change_path: custom_images/${{ matrix.image }}
          bump_each_commit: true
          enable_prerelease_mode: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./custom_images/${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Push version git tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.semver.outputs.version_tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping git tag push"
            exit 0
          fi
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"

      - name: Summary
        run: |
          echo "Published ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.semver.outputs.version }}"
          echo "Git tag: ${{ steps.semver.outputs.version_tag }}"
          echo "Digest: ${{ steps.meta.outputs.digest }}"
          echo "Renovate will open a PR to bump cluster image pins when it detects the new tag on GHCR."
