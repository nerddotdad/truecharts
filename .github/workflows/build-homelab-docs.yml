name: Build Homelab Docs

on:
  push:
    paths:
      - 'documentation/**'
      - 'clusters/**/helm-release*.yaml'
      - 'mkdocs/**'
      - 'scripts/collect_mkdocs.py'
      - 'scripts/doc_metadata.py'
      - 'scripts/doc_paths.py'
      - 'scripts/helmrelease_docs.py'
      - 'scripts/runbook_index.py'
      - 'custom_images/homelab-docs/**'
    paths-ignore:
      - 'custom_images/homelab-docs/VERSION'
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: homelab-docs

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and bump VERSION
        id: version
        run: |
          set -euo pipefail
          vf="custom_images/${{ env.IMAGE_NAME }}/VERSION"
          if [ ! -f "$vf" ]; then
            echo "1.0.0" > "$vf"
          fi
          ver=$(tr -d '[:space:]' < "$vf")
          version_changed=false
          if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- "$vf" | grep -q .; then
              version_changed=true
            fi
          fi
          if [ "$version_changed" = false ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            IFS=. read -r ma mi pa <<< "$ver"
            ver="${ma}.${mi}.$((pa + 1))"
            echo "$ver" > "$vf"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push docs image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: custom_images/homelab-docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MKDOCS_SITE_URL=${{ vars.DOCS_SITE_URL || 'https://docs.example.com' }}
            DOCS_BUILD_SHA=${{ github.sha }}
            DOCS_BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
            DOCS_IMAGE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Commit VERSION file
        run: |
          set -euo pipefail
          vf="custom_images/${{ env.IMAGE_NAME }}/VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$vf"
          git diff --staged --quiet || git commit -m "chore(custom_images): bump homelab-docs to ${{ steps.version.outputs.version }} [skip ci]"
          git diff --staged --quiet || git push

      - name: Summary
        run: |
          echo "Published ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "Digest: ${{ steps.meta.outputs.digest }}"
          echo "Renovate will open a PR updating homelab-docs HelmRelease pin."
