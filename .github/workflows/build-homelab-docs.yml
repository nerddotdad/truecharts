name: Build Homelab Docs

on:
  push:
    paths:
      - 'clusters/**/mk_*.md'
      - 'clusters/**/helm-release*.yaml'
      - 'clusters/main/kubernetes/mk_index.md'
      - 'clusters/main/mk_index.md'
      - 'mkdocs/**'
      - 'scripts/collect_mkdocs.py'
      - 'scripts/doc_metadata.py'
      - 'scripts/helmrelease_docs.py'
      - 'scripts/runbook_index.py'
      - 'custom_images/homelab-docs/**'
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: homelab-docs

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      bumps-json: ${{ steps.bumps-json.outputs.json }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get and bump image version
        id: version
        run: |
          VERSION_FILE="custom_images/${{ env.IMAGE_NAME }}/VERSION"
          if [ -f "$VERSION_FILE" ]; then
            CURRENT_VERSION=$(tr -d '[:space:]' < "$VERSION_FILE")
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              VERSION_CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q "^${VERSION_FILE}$" && echo yes || echo no)
            else
              VERSION_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "^${VERSION_FILE}$" && echo yes || echo no)
            fi
            if [ "$VERSION_CHANGED" = "yes" ]; then
              VERSION="$CURRENT_VERSION"
            elif [[ $CURRENT_VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
              echo "$VERSION" > "$VERSION_FILE"
            else
              VERSION="$CURRENT_VERSION"
            fi
          else
            VERSION=$(date +"%Y.%m.%d-%H%M")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Image version: $VERSION"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push docs image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: custom_images/homelab-docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MKDOCS_SITE_URL=${{ vars.DOCS_SITE_URL || 'https://docs.example.com' }}
            DOCS_BUILD_SHA=${{ github.sha }}
            DOCS_BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
            DOCS_IMAGE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Prepare bumps JSON for manifest sync
        id: bumps-json
        run: |
          jq -n \
            --arg image "${{ env.IMAGE_NAME }}" \
            --arg version "${{ steps.version.outputs.version }}" \
            '[{image: $image, version: $version}]' > bumps.json
          echo "json<<EOF" >> "$GITHUB_OUTPUT"
          cat bumps.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "Published ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "Helm tag bump PR follows via sync-custom-image-tags workflow."

  sync-manifests:
    needs: build
    if: needs.build.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/sync-custom-image-tags.yml
    with:
      bumps-json: ${{ needs.build.outputs.bumps-json }}
    secrets: inherit
