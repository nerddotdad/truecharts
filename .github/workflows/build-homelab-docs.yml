name: Build Homelab Docs

on:
  push:
    paths:
      - 'documentation/**'
      - 'clusters/**/helm-release*.yaml'
      - 'mkdocs/**'
      - 'scripts/collect_mkdocs.py'
      - 'scripts/doc_metadata.py'
      - 'scripts/doc_paths.py'
      - 'scripts/helmrelease_docs.py'
      - 'scripts/runbook_index.py'
      - 'custom_images/homelab-docs/**'
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: homelab-docs

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine semver
        id: semver
        uses: PaulHatch/semantic-version@a8f8f59fd7f0625188492e945240f12d7ad2dca3 # v5.4.0
        with:
          tag_prefix: ""
          namespace: ${{ env.IMAGE_NAME }}
          change_path: "custom_images/homelab-docs documentation mkdocs scripts"
          bump_each_commit: true
          enable_prerelease_mode: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push docs image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: custom_images/homelab-docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MKDOCS_SITE_URL=${{ vars.DOCS_SITE_URL || 'https://docs.example.com' }}
            DOCS_BUILD_SHA=${{ github.sha }}
            DOCS_BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
            DOCS_IMAGE_VERSION=${{ steps.semver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Push version git tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.semver.outputs.version_tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping git tag push"
            exit 0
          fi
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"

      - name: Summary
        run: |
          echo "Published ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"
          echo "Git tag: ${{ steps.semver.outputs.version_tag }}"
          echo "Digest: ${{ steps.meta.outputs.digest }}"
          echo "Renovate will open a PR to bump the homelab-docs HelmRelease pin when it detects the new tag on GHCR."
